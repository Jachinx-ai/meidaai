<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>美搭 · 埋点位置流程图</title>
<style>
  :root{
    --surface-1:#fff; --border:#e5e3db; --border-strong:#c9c6bc;
    --text-primary:#2c2c2a; --text-secondary:#5f5e5a;
  }
  body{margin:0;background:#f7f6f2;color:var(--text-primary);
       font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;
       display:flex;flex-direction:column;align-items:center;padding:24px;}
  h1{font-size:20px;font-weight:500;margin:0 0 4px;}
  p.sub{color:var(--text-secondary);font-size:13px;margin:0 0 20px;}
  .wrap{width:100%;max-width:720px;background:#fff;border:1px solid var(--border);
        border-radius:16px;padding:16px;box-sizing:border-box;}
  svg{width:100%;height:auto;display:block;}
  .box{fill:var(--surface-1);stroke:var(--border-strong);stroke-width:1.2;}
  .c-blue{fill:#e6f1fb;stroke:#85b7eb;stroke-width:1;}
  .c-teal{fill:#e1f5ee;stroke:#5dcaa5;stroke-width:1;}
  .c-amber{fill:#faeeda;stroke:#ef9f27;stroke-width:1;}
  text{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;}
  .t{font-size:14px;fill:var(--text-primary);}
  .th{font-size:14px;font-weight:500;fill:var(--text-primary);}
  .ts{font-size:12px;fill:var(--text-secondary);}
  .code{font-family:"SF Mono",Menlo,Consolas,monospace;font-size:13px;font-weight:500;fill:#0c447c;}
  .code-t{fill:#0f6e56;}
  legend{display:none;}
</style>
</head>
<body>
<h1>美搭 · 埋点位置流程图</h1>
<p class="sub">左＝用户主路径（页面 / 接口）　右＝每步该埋的事件　蓝＝前端埋 · 青＝后端埋（数字以此为准）· 琥珀＝关键商业信号</p>
<div class="wrap">
<svg viewBox="0 0 680 664" xmlns="http://www.w3.org/2000/svg">
<defs>
<marker id="ar" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
<path d="M1,1 L6,4 L1,7" fill="none" stroke="#c9c6bc" stroke-width="1.4"/>
</marker>
</defs>

<rect x="40" y="22" width="12" height="12" rx="3" class="c-blue"/>
<text class="ts" x="58" y="32">前端事件</text>
<rect x="150" y="22" width="12" height="12" rx="3" class="c-teal"/>
<text class="ts" x="168" y="32">后端事件（数字以此为准）</text>
<rect x="420" y="22" width="12" height="12" rx="3" class="c-amber"/>
<text class="ts" x="438" y="32">关键商业信号</text>

<line x1="115" y1="160" x2="115" y2="172" stroke="#c9c6bc" stroke-width="1.4" marker-end="url(#ar)"/>
<line x1="115" y1="244" x2="115" y2="256" stroke="#c9c6bc" stroke-width="1.4" marker-end="url(#ar)"/>
<line x1="115" y1="360" x2="115" y2="372" stroke="#c9c6bc" stroke-width="1.4" marker-end="url(#ar)"/>
<line x1="115" y1="508" x2="115" y2="520" stroke="#c9c6bc" stroke-width="1.4" marker-end="url(#ar)"/>

<rect x="40" y="56" width="150" height="104" rx="12" class="box"/>
<text class="th" x="115" y="102" text-anchor="middle">① 落地 / 注册</text>
<text class="ts" x="115" y="120" text-anchor="middle">login · signup</text>
<rect x="210" y="64" width="280" height="24" rx="6" class="c-blue"/><text class="code" x="222" y="80">page_view</text><text class="ts" x="478" y="80" text-anchor="end">全站每页</text>
<rect x="210" y="96" width="280" height="24" rx="6" class="c-teal"/><text class="code code-t" x="222" y="112">signup_success</text><text class="ts" x="478" y="112" text-anchor="end">注册成功</text>
<rect x="210" y="128" width="280" height="24" rx="6" class="c-teal"/><text class="code code-t" x="222" y="144">login_success</text><text class="ts" x="478" y="144" text-anchor="end">登录成功</text>

<rect x="40" y="172" width="150" height="72" rx="12" class="box"/>
<text class="th" x="115" y="202" text-anchor="middle">② 引导问卷</text>
<text class="ts" x="115" y="220" text-anchor="middle">onboarding</text>
<rect x="210" y="180" width="280" height="24" rx="6" class="c-blue"/><text class="code" x="222" y="196">onboarding_start</text><text class="ts" x="478" y="196" text-anchor="end">进入问卷</text>
<rect x="210" y="212" width="280" height="24" rx="6" class="c-blue"/><text class="code" x="222" y="228">onboarding_done</text><text class="ts" x="478" y="228" text-anchor="end">完成 + 画像</text>

<rect x="40" y="256" width="150" height="104" rx="12" class="box"/>
<text class="th" x="115" y="302" text-anchor="middle">③ 拆图建衣橱</text>
<text class="ts" x="115" y="320" text-anchor="middle">/api/segment</text>
<rect x="210" y="264" width="280" height="24" rx="6" class="c-blue"/><text class="code" x="222" y="280">split_submit</text><text class="ts" x="478" y="280" text-anchor="end">提交拆图</text>
<rect x="210" y="296" width="280" height="24" rx="6" class="c-teal"/><text class="code code-t" x="222" y="312">split_done / fail</text><text class="ts" x="478" y="312" text-anchor="end">结果 · 失败因</text>
<rect x="210" y="328" width="280" height="24" rx="6" class="c-blue"/><text class="code" x="222" y="344">item_confirm</text><text class="ts" x="478" y="344" text-anchor="end">确认入衣橱</text>

<rect x="40" y="372" width="150" height="136" rx="12" class="box"/>
<text class="th" x="115" y="434" text-anchor="middle">④ 试穿（核心）</text>
<text class="ts" x="115" y="452" text-anchor="middle">/api/tryon</text>
<rect x="210" y="380" width="280" height="24" rx="6" class="c-blue"/><text class="code" x="222" y="396">tryon_view</text><text class="ts" x="478" y="396" text-anchor="end">进入试穿页</text>
<rect x="210" y="412" width="280" height="24" rx="6" class="c-blue"/><text class="code" x="222" y="428">tryon_submit</text><text class="ts" x="478" y="428" text-anchor="end">发起 · 场景件数</text>
<rect x="210" y="444" width="280" height="24" rx="6" class="c-teal"/><text class="code code-t" x="222" y="460">tryon_done / fail</text><text class="ts" x="478" y="460" text-anchor="end">生成结果</text>
<rect x="210" y="476" width="280" height="24" rx="6" class="c-blue"/><text class="code" x="222" y="492">tryon_save / share</text><text class="ts" x="478" y="492" text-anchor="end">保存 · 分享</text>

<rect x="40" y="520" width="150" height="104" rx="12" class="box"/>
<text class="th" x="115" y="566" text-anchor="middle">⑤ 留存 / 互动</text>
<text class="ts" x="115" y="584" text-anchor="middle">favorite · history</text>
<rect x="210" y="528" width="280" height="24" rx="6" class="c-blue"/><text class="code" x="222" y="544">favorite_add</text><text class="ts" x="478" y="544" text-anchor="end">收藏搭配</text>
<rect x="210" y="560" width="280" height="24" rx="6" class="c-blue"/><text class="code" x="222" y="576">history_view</text><text class="ts" x="478" y="576" text-anchor="end">查看历史</text>
<rect x="210" y="592" width="280" height="24" rx="6" class="c-blue"/><text class="code" x="222" y="608">recommend_click</text><text class="ts" x="478" y="608" text-anchor="end">点推荐位</text>

<line x1="490" y1="308" x2="512" y2="378" stroke="#c9c6bc" stroke-width="1.2" stroke-dasharray="3 3"/>
<line x1="490" y1="456" x2="512" y2="404" stroke="#c9c6bc" stroke-width="1.2" stroke-dasharray="3 3"/>
<rect x="512" y="330" width="128" height="120" rx="12" class="c-amber"/>
<text class="th" x="576" y="364" text-anchor="middle" fill="#854f0b">quota_block</text>
<text class="ts" x="576" y="390" text-anchor="middle">撞每日配额上限</text>
<text class="ts" x="576" y="410" text-anchor="middle">被拦截</text>
<text class="ts" x="576" y="434" text-anchor="middle">= 付费意愿信号</text>
</svg>
</div>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>试衣历史 · AI穿搭助手</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/base.css">
<style>
  .hist-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; padding: 16px 24px 26px; }
  .hcard {
    position: relative;
    border-radius: var(--r-lg); overflow: hidden;
    box-shadow: var(--shadow-card);
    cursor: pointer;
    background: var(--card);
  }
  .hcard:nth-child(odd) { aspect-ratio: .78; }
  .hcard:nth-child(even) { aspect-ratio: .92; }
  .hcard .bg { position: absolute; inset: 0; }
  .hcard .fit {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center; padding: 18%;
  }
  .hcard .fit img { max-width: 100%; max-height: 100%; }
  .hcard .meta {
    position: absolute; left: 10px; bottom: 10px; right: 10px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .hcard .tag {
    background: rgba(255,255,255,.88); backdrop-filter: blur(4px);
    padding: 5px 11px; border-radius: 999px;
    font-size: 11.5px; font-weight: 700;
  }
  .hcard .date { font-size: 11px; color: rgba(16,16,18,.55); font-weight: 600; background: rgba(255,255,255,.7); padding: 4px 8px; border-radius: 999px; }
  .hcard .ck {
    position: absolute; top: 10px; right: 10px;
    width: 22px; height: 22px; border-radius: 50%;
    background: rgba(255,255,255,.92); border: 1.5px solid #d0d0cd;
    display: none; place-content: center; font-size: 12px; font-weight: 900; color: #fff;
  }
  .editing .hcard .ck { display: grid; }
  .hcard.sel .ck { background: var(--danger); border-color: var(--danger); }
  .hcard.sel .ck::after { content: "✓"; }

  .edit-pill {
    border: 1.5px solid var(--line); background: var(--card);
    color: var(--ink); padding: 9px 18px; border-radius: 999px;
    font-size: 14px; font-weight: 700; cursor: pointer;
  }
  .del-bar {
    position: sticky; bottom: calc(var(--nav-h) + 12px); z-index: 20;
    margin: 0 24px;
    display: none;
  }
  .editing-bar .del-bar { display: block; }
  .empty { text-align: center; color: var(--muted); padding: 90px 40px; font-size: 14.5px; line-height: 2; }
</style>
</head>
<body>
<div class="app" id="appRoot">

  <div class="pagehead" style="padding-top:14px">
    <div>
      <div class="h-display rise" style="font-size:28px">试衣历史</div>
      <div class="section-note rise" id="countNote" style="margin-top:6px"></div>
    </div>
    <span class="grow"></span>
    <button class="edit-pill rise" id="btnEdit">编辑</button>
  </div>

  <div class="chips rise d1" id="sceneChips" style="padding-top:10px"></div>

  <div class="hist-grid rise d2" id="grid"></div>

  <div class="del-bar">
    <button class="btn btn-primary btn-block" id="btnDel" style="background:var(--danger)">删除所选（0）</button>
  </div>
</div>

<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script>
  renderStatusbar();
  renderTabbar("history");

  /* 若无历史记录，填充演示数据 */
  const TINTS = [
    "linear-gradient(150deg,#f6e3d7,#eed7cf)", "linear-gradient(150deg,#e5ddf0,#d8d0ea)",
    "linear-gradient(150deg,#efe9dc,#e7dfd0)", "linear-gradient(150deg,#f2ded2,#ecd4c6)",
    "linear-gradient(150deg,#dcead9,#cfe3cd)", "linear-gradient(150deg,#eae4da,#e0d9cd)",
  ];
  if (!Store.get().history.length) {
    const demo = OUTFITS.slice(0, 6).map((o, i) => ({
      id: "h" + i, outfitId: o.id, items: o.items, scene: o.scene,
      time: Date.now() - i * 86400000 * 2,
    }));
    Store.set({ history: demo });
  }

  let scene = "全部", editing = false;
  const sel = new Set();

  function renderGrid() {
    const list = Store.get().history.filter(h => scene === "全部" || h.scene === scene);
    $("#countNote").textContent = `共 ${list.length} 张 · 仅自己可见`;
    $("#grid").innerHTML = list.length ? list.map((h, i) => `
      <div class="hcard" data-id="${h.id}">
        <div class="bg" style="background:${TINTS[i % TINTS.length]}"></div>
        <div class="fit"><img src="assets/ph/model.svg" alt="试衣照"></div>
        <span class="ck"></span>
        <div class="meta">
          <span class="tag">${h.scene}</span>
          <span class="date">${fmtTime(h.time)}</span>
        </div>
      </div>`).join("")
      : `<div class="empty" style="grid-column:1/-1">还没有试衣记录<br>去首页挑一套搭配试穿吧</div>`;

    $$(".hcard").forEach(c => c.addEventListener("click", () => {
      const id = c.dataset.id;
      if (editing) {
        sel.has(id) ? sel.delete(id) : sel.add(id);
        c.classList.toggle("sel", sel.has(id));
        $("#btnDel").textContent = `删除所选（${sel.size}）`;
      } else {
        const h = Store.get().history.find(x => x.id === id);
        location.href = h.outfitId ? `outfit-detail.html?id=${h.outfitId}` : "javascript:;";
      }
    }));
  }

  $("#btnEdit").addEventListener("click", () => {
    editing = !editing;
    sel.clear();
    $("#btnEdit").textContent = editing ? "完成" : "编辑";
    $("#appRoot").classList.toggle("editing", editing);
    $("#appRoot").classList.toggle("editing-bar", editing);
    $("#btnDel").textContent = "删除所选（0）";
    renderGrid();
  });

  $("#btnDel").addEventListener("click", () => {
    if (!sel.size) { toast("先选择要删除的记录"); return; }
    Store.set({ history: Store.get().history.filter(h => !sel.has(h.id)) });
    toast(`已删除 ${sel.size} 条记录`);
    sel.clear();
    $("#btnDel").textContent = "删除所选（0）";
    renderGrid();
  });

  renderChips($("#sceneChips"), SCENES, s => { scene = s; renderGrid(); });
  renderGrid();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>首页 · AI穿搭助手</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/base.css">
<style>
  .home-head { display: flex; align-items: center; padding: 10px var(--pad) 6px; }

  .sec-head { display: flex; align-items: baseline; padding: 12px var(--pad) 12px; gap: 10px; }

  /* 搭配卡网格：只展示图片 + 左下收藏 / 右下试穿 */
  .outfits { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; padding: 0 var(--pad) 26px; }
  .ocard {
    min-width: 0;
    background: var(--card); border-radius: var(--r-lg);
    box-shadow: var(--shadow-card);
    padding: 14px; position: relative; cursor: pointer;
  }
  .collage { position: relative; display: grid; grid-template-columns: 1.3fr 1fr; gap: 6px; align-items: center; min-height: 128px; }
  .collage .ocover { aspect-ratio: auto; object-fit: cover; height: 100%; }
  .collage img { width: 100%; aspect-ratio: 1; object-fit: contain; }
  .collage .side { display: flex; flex-direction: column; gap: 2px; }
  .collage .side img { aspect-ratio: 1.1; }
  .ocard .ofoot { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; }
  .ocard .star {
    width: 34px; height: 34px; border-radius: 50%;
    border: 1.5px solid var(--line); background: var(--card);
    font-size: 15px; cursor: pointer; color: #c9c9c6;
    display: flex; align-items: center; justify-content: center;
    flex: none;
  }
  .ocard .star.on { color: #101012; border-color: var(--ink); }
  .try-pill {
    flex: 1; margin-left: 12px; white-space: nowrap;
    border: none; background: var(--ink); color: #fff;
    padding: 9px 18px; border-radius: 999px;
    font-size: 13px; font-weight: 600; cursor: pointer;
  }
</style>
</head>
<body>
<div class="app">

  <div class="home-head">
    <div class="brand rise">AI<span class="zh">穿搭助手</span></div>
  </div>

  <div class="sec-head rise d1">
    <span class="section-title">灵感试穿</span>
  </div>

  <div class="chips rise d1" id="sceneChips" style="padding-bottom:14px"></div>

  <div class="outfits rise d2" id="outfitGrid"></div>
</div>

<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script>
  renderStatusbar();
  renderTabbar("home");

  let scene = "全部";
  function renderOutfits() {
    const list = availableOutfits().filter(o => scene === "全部" || o.scene === scene);
    const favs = Store.get().favorites;
    if (!list.length) {
      $("#outfitGrid").innerHTML = `<div style="grid-column:1/-1;text-align:center;color:var(--muted);padding:70px 40px;font-size:15px;line-height:2">这个场景还没有搭配<br>去试穿页用 AI 搭一套吧</div>`;
      return;
    }
    $("#outfitGrid").innerHTML = list.map(o => {
      const its = o.items.map(itemById).filter(Boolean);
      return `
      <div class="ocard" data-id="${o.id}">
        <div class="collage">
          ${itemImg(its[0])}
          <div class="side">${its.slice(1, 3).map(i => itemImg(i)).join("")}</div>
          ${outfitCover(o.id)}
        </div>
        <div class="ofoot">
          <button class="star ${favs.includes(o.id) ? "on" : ""}" data-fav="${o.id}">★</button>
          <button class="try-pill" data-try="${o.id}">试穿</button>
        </div>
      </div>`;
    }).join("");

    $$("[data-fav]").forEach(b => b.addEventListener("click", e => {
      e.stopPropagation();
      const id = b.dataset.fav;
      const favs = Store.get().favorites;
      const on = favs.includes(id);
      Store.set({ favorites: on ? favs.filter(f => f !== id) : [...favs, id] });
      b.classList.toggle("on", !on);
      toast(on ? "已取消收藏" : "已加入收藏");
    }));
    $$("[data-try]").forEach(b => b.addEventListener("click", e => {
      e.stopPropagation();
      location.href = `tryon.html?outfit=${b.dataset.try}`;
    }));
    $$(".ocard").forEach(c => c.addEventListener("click", () =>
      location.href = `outfit-detail.html?id=${c.dataset.id}`));
  }
  renderChips($("#sceneChips"), SCENES, s => { scene = s; renderOutfits(); });
  renderOutfits();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>首页 · AI穿搭助手</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/base.css">
<style>
  .home-head { display: flex; align-items: flex-start; padding: 10px 24px 14px; }
  .weather { text-align: right; font-size: 13.5px; font-weight: 700; }
  .weather small { display: block; font-weight: 500; color: var(--muted); margin-top: 2px; }

  /* 黑色 AI 推荐卡 */
  .ai-card {
    margin: 0 24px 16px;
    background: #141416; color: #fff;
    border-radius: var(--r-xl);
    padding: 20px;
    display: flex; gap: 14px;
    cursor: pointer;
    box-shadow: var(--shadow-float);
  }
  .ai-card .txt { flex: 1.15; display: flex; flex-direction: column; }
  .ai-tag {
    width: fit-content; font-size: 11.5px; font-weight: 700;
    padding: 5px 10px; border-radius: 999px;
    background: rgba(255,255,255,.14);
    background-image: var(--grad); -webkit-background-clip: text; background-clip: text; color: transparent;
    border: 1px solid rgba(255,255,255,.18);
  }
  .ai-card h2 { font-size: 21px; font-weight: 900; margin: 12px 0 8px; color: #fff; }
  .ai-card p { font-size: 13px; line-height: 1.7; color: rgba(255,255,255,.62); }
  .ai-card .imgs {
    flex: 1; background: #fff; border-radius: var(--r-md);
    display: grid; grid-template-columns: 1fr 1fr; gap: 4px; padding: 10px; align-items: center;
  }
  .ai-card .imgs img { width: 100%; aspect-ratio: 1; object-fit: contain; }

  /* AI 聊天输入胶囊 */
  .chat-pill {
    margin: 0 24px 22px;
    display: flex; align-items: center; gap: 10px;
    padding: 8px 8px 8px 20px;
    cursor: pointer;
  }
  .chat-pill span { flex: 1; color: var(--muted); font-size: 14.5px; }
  .chat-pill .go {
    background: var(--ink); color: #fff;
    border: none; border-radius: 999px;
    padding: 10px 20px; font-size: 14px; font-weight: 700; cursor: pointer;
  }

  .sec-head { display: flex; align-items: baseline; padding: 4px 24px 12px; gap: 10px; }

  /* 搭配卡网格 */
  .outfits { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; padding: 0 24px 26px; }
  .ocard {
    background: var(--card); border-radius: var(--r-lg);
    box-shadow: var(--shadow-card);
    padding: 14px; position: relative; cursor: pointer;
  }
  .ocard .star {
    position: absolute; top: 10px; right: 10px; z-index: 2;
    width: 32px; height: 32px; border-radius: 50%;
    border: none; background: rgba(255,255,255,.9);
    font-size: 15px; cursor: pointer; color: #c9c9c6;
    box-shadow: var(--shadow-card);
  }
  .ocard .star.on { color: #101012; }
  .collage { display: grid; grid-template-columns: 1.3fr 1fr; gap: 6px; align-items: center; min-height: 128px; }
  .collage img { width: 100%; aspect-ratio: 1; object-fit: contain; }
  .collage .side { display: flex; flex-direction: column; gap: 2px; }
  .collage .side img { aspect-ratio: 1.1; }
  .ocard .oname { font-size: 14.5px; font-weight: 800; margin-top: 10px; }
  .ocard .ofoot { display: flex; align-items: center; justify-content: space-between; margin-top: 8px; }
  .ocard .scene-tag { font-size: 12px; color: var(--muted); }
  .try-pill {
    border: none; background: var(--ink); color: #fff;
    padding: 8px 16px; border-radius: 999px;
    font-size: 12.5px; font-weight: 700; cursor: pointer;
  }
</style>
</head>
<body>
<div class="app">

  <div class="home-head">
    <div class="brand rise">AI<span class="zh">穿搭助手</span></div>
    <span class="grow"></span>
    <div class="weather rise">5~13°C 多云<small>北京</small></div>
  </div>

  <div class="ai-card rise d1" id="aiCard">
    <div class="txt">
      <span class="ai-tag">✦ AI Stylist</span>
      <h2 id="aiName"></h2>
      <p id="aiDesc"></p>
    </div>
    <div class="imgs" id="aiImgs"></div>
  </div>

  <div class="chat-pill ai-pill rise d2" onclick="toast('AI 造型师即将上线，敬请期待')">
    <span>问我任何穿搭问题…</span>
    <button class="go">✦ 聊一聊</button>
  </div>

  <div class="sec-head rise d3">
    <span class="section-title">成套搭配</span>
    <span class="grow"></span>
    <span class="section-note" id="secNote"></span>
  </div>

  <div class="chips rise d3" id="sceneChips" style="padding-bottom:14px"></div>

  <div class="outfits rise d4" id="outfitGrid"></div>
</div>

<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script>
  renderStatusbar();
  renderTabbar("home");

  /* AI 今日推荐卡 */
  const rec = OUTFITS[new Date().getDate() % OUTFITS.length];
  $("#aiName").textContent = rec.name;
  $("#aiDesc").textContent = rec.desc;
  $("#aiImgs").innerHTML = rec.items.slice(0, 4).map(id => itemImg(itemById(id))).join("");
  $("#aiCard").addEventListener("click", () => location.href = `tryon.html?outfit=${rec.id}`);

  /* 场景筛选 + 搭配卡 */
  let scene = "全部";
  function renderOutfits() {
    const list = OUTFITS.filter(o => scene === "全部" || o.scene === scene);
    $("#secNote").textContent = `${list.length} 套模板 · 每套可逐件替换`;
    const favs = Store.get().favorites;
    $("#outfitGrid").innerHTML = list.map(o => {
      const its = o.items.map(itemById);
      return `
      <div class="ocard" data-id="${o.id}">
        <button class="star ${favs.includes(o.id) ? "on" : ""}" data-fav="${o.id}">★</button>
        <div class="collage">
          ${itemImg(its[0])}
          <div class="side">${its.slice(1, 3).map(i => itemImg(i)).join("")}</div>
        </div>
        <div class="oname">${o.name}</div>
        <div class="ofoot">
          <span class="scene-tag">${o.scene} · ${its.length} 件单品</span>
          <button class="try-pill" data-try="${o.id}">试穿</button>
        </div>
      </div>`;
    }).join("");

    $$("[data-fav]").forEach(b => b.addEventListener("click", e => {
      e.stopPropagation();
      const id = b.dataset.fav;
      const favs = Store.get().favorites;
      const on = favs.includes(id);
      Store.set({ favorites: on ? favs.filter(f => f !== id) : [...favs, id] });
      b.classList.toggle("on", !on);
      toast(on ? "已取消收藏" : "已加入收藏");
    }));
    $$("[data-try]").forEach(b => b.addEventListener("click", e => {
      e.stopPropagation();
      location.href = `tryon.html?outfit=${b.dataset.try}`;
    }));
    $$(".ocard").forEach(c => c.addEventListener("click", () =>
      location.href = `outfit-detail.html?id=${c.dataset.id}`));
  }
  renderChips($("#sceneChips"), SCENES, s => { scene = s; renderOutfits(); });
  renderOutfits();
</script>
</body>
</html>

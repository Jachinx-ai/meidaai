<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#e9f5ee">
<title>穿搭详情 · 美搭</title>
<link rel="stylesheet" href="css/base.css">
<style>
  .hero {
    position: relative;
    margin: 6px var(--pad) 0;
    background: var(--card);
    border-radius: var(--r-xl);
    box-shadow: var(--shadow-card);
    padding: 24px;
    min-height: 300px;
    display: grid; grid-template-columns: 1.2fr 1fr; gap: 12px; align-items: center;
  }
  .hero img { width: 100%; object-fit: contain; }
  .hero .main img { aspect-ratio: .8; }
  .hero .side { display: flex; flex-direction: column; gap: 8px; }
  .hero .side img { aspect-ratio: 1.1; }
  .hero .ocover { border-radius: var(--r-xl); aspect-ratio: auto; object-fit: cover; height: 100%; }

  /* 替换玩法提示：轻量灰字，不抢大图版面 */
  .swap-hint {
    display: flex; align-items: center; justify-content: center; gap: 5px;
    font-size: 12.5px; color: var(--muted);
    margin-top: 12px;
  }
  .pieces { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; padding: 20px var(--pad); }
  .piece {
    background: var(--card); border-radius: var(--r-md);
    box-shadow: var(--shadow-card);
    padding: 12px; cursor: pointer;
    border: 2px solid transparent;
    transition: border-color .15s ease;
  }
  .piece:active { border-color: var(--ink); }
  .piece img { width: 100%; aspect-ratio: 1; object-fit: contain; }

  .detail-foot {
    position: sticky; bottom: 0;
    padding: 14px var(--pad) calc(20px + env(safe-area-inset-bottom));
    background: linear-gradient(transparent, var(--bg) 40%);
    display: flex; gap: 12px;
  }

  /* 替换弹窗：网格内部滚动，确认栏固定白底在最上层 */
  #sheetSwap {
    display: flex; flex-direction: column;
    padding-bottom: 0;
    height: 72dvh;
  }
  .swap-grid {
    flex: 1; min-height: 0;
    overflow-y: auto;
    overscroll-behavior: contain;
    -webkit-overflow-scrolling: touch;
    display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
    align-content: start;
    padding-bottom: 10px;
  }
  .swap-cell {
    min-width: 0;
    background: var(--fill); border-radius: var(--r-md);
    aspect-ratio: .9; padding: 14px; cursor: pointer;
    border: 2.5px solid transparent;
  }
  .swap-cell.on { border-color: var(--ink); background: #fff; }
  .swap-cell img { width: 100%; height: 100%; object-fit: contain; }
  .swap-foot {
    flex: none;
    background: #fff;
    border-top: 1px solid var(--line);
    padding: 12px 0 calc(18px + env(safe-area-inset-bottom));
    margin: 0 -24px;            /* 白底左右铺满 sheet */
    padding-left: 24px; padding-right: 24px;
    position: relative; z-index: 2;
  }
</style>
</head>
<body>
<div class="app">

  <div class="pagehead">
    <button class="iconbtn" onclick="history.length > 1 ? history.back() : location.href='home.html'"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 5 8 12l6.5 7"/></svg></button>
  </div>

  <div class="scroll-body">
    <div class="hero rise" id="hero"></div>
    <p class="swap-hint rise d1">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 9a8 8 0 0 1 14-3.5L20 8"/><path d="M20 3v5h-5"/><path d="M20 15a8 8 0 0 1-14 3.5L4 16"/><path d="M4 21v-5h5"/></svg>
      轻点图中单品，可替换成同类款
    </p>
    <div class="pieces rise d1" id="pieces"></div>
  </div>

  <div class="detail-foot">
    <button class="btn btn-ghost" style="flex:1" id="btnFav2">★ 收藏</button>
    <button class="btn btn-primary" style="flex:2" id="btnTry">试穿</button>
  </div>
</div>

<!-- 替换单品 Sheet -->
<div class="sheet-mask" id="mask-sheetSwap" onclick="closeSheet('sheetSwap')"></div>
<div class="sheet" id="sheetSwap">
  <div class="sheet-grab"></div>
  <div class="sheet-title" id="swapTitle">替换
    <button class="sheet-x" onclick="closeSheet('sheetSwap')">✕</button>
  </div>
  <div class="swap-grid" id="swapGrid"></div>
  <div class="swap-foot">
    <button class="btn btn-primary btn-block" id="btnSwapOk">确认</button>
  </div>
</div>

<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script>
  renderStatusbar();

  /* 带 id 时必须在可用搭配里找到（含已删单品/性别偏好外的视为失效）；
     不带 id（桌面总览页直开）→ 回退第一套可用搭配 */
  const oid = new URLSearchParams(location.search).get("id");
  const avail = availableOutfits();
  const o = oid ? avail.find(x => x.id === oid) : (avail[0] || OUTFITS[0]);

  if (!o) {
    /* 失效搭配：提示后回首页，跳过全部渲染逻辑 */
    toast("该搭配已不可用");
    setTimeout(() => location.replace("home.html"), 800);
  } else {
    let items = [...o.items];   // 当前展示的单品（可被替换）

    function render() {
      const its = items.map(itemById).filter(Boolean);
      const changed = items.join(",") !== o.items.join(",");
      $("#hero").innerHTML = `
        <div class="main" data-p="${its[0].id}">${itemImg(its[0])}</div>
        <div class="side">${its.slice(1, 4).map(i =>
          `<span data-p="${i.id}">${itemImg(i)}</span>`).join("")}</div>
        ${changed ? "" : outfitCover(o.id)}`;
      $("#pieces").innerHTML = its.map(i => `
        <div class="piece" data-p="${i.id}">${itemImg(i)}</div>`).join("");
      $$("[data-p]").forEach(el => el.addEventListener("click", () => openSwap(el.dataset.p)));
    }

    /* 点击单品 → 弹替换弹窗（同分类：默认单品 + 用户上传的） */
    let swapFrom = null, swapTo = null;
    function openSwap(id) {
      swapFrom = id; swapTo = null;
      const it = itemById(id);
      $("#swapTitle").childNodes[0].textContent = `替换${it.cat}`;
      const options = wardrobeItems().filter(x => x.cat === it.cat && x.id !== id);
      $("#swapGrid").innerHTML = options.length ? options.map(x => `
        <div class="swap-cell" data-s="${x.id}">${itemImg(x)}</div>`).join("")
        : `<div style="grid-column:1/-1;text-align:center;color:var(--muted);padding:30px 0;font-size:15px;line-height:2">衣橱里没有其他${it.cat}<br>去底部 + 号上传吧</div>`;
      $$("[data-s]").forEach(c => c.addEventListener("click", () => {
        $$(".swap-cell").forEach(x => x.classList.remove("on"));
        c.classList.add("on");
        swapTo = c.dataset.s;
      }));
      openSheet("sheetSwap");
    }
    $("#btnSwapOk").addEventListener("click", () => {
      if (!swapTo) { toast("请先选择要替换的单品"); return; }
      items = items.map(i => (i === swapFrom ? swapTo : i));
      closeSheet("sheetSwap");
      render();
      toast("替换成功");
    });

    /* 收藏 / 试穿 */
    function syncFav() {
      const on = Store.get().favorites.includes(o.id);
      $("#btnFav2").textContent = on ? "★ 已收藏" : "★ 收藏";
    }
    $("#btnFav2").addEventListener("click", () => {
      const favs = Store.get().favorites;
      const on = favs.includes(o.id);
      Store.set({ favorites: on ? favs.filter(f => f !== o.id) : [...favs, o.id] });
      syncFav();
      /* 替换过单品后收藏存的仍是原搭配，文案说清楚 */
      const changed = items.join(",") !== o.items.join(",");
      toast(on ? "已取消收藏" : (changed ? "已收藏原搭配" : "已加入收藏"));
    });
    $("#btnTry").addEventListener("click", () => {
      const changed = items.join(",") !== o.items.join(",");
      location.href = changed ? `tryon.html?items=${items.join(",")}` : `tryon.html?outfit=${o.id}`;
    });

    render(); syncFav();
  }
</script>
</body>
</html>

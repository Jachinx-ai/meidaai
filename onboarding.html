<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>新用户引导 · AI穿搭助手</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/base.css">
<style>
  /* 引导页锁定为一屏：内容区滚动，底部按钮永远完整可见 */
  .app { height: 100dvh; min-height: 0; }
  .step { flex: 1; min-height: 0; display: none; flex-direction: column; padding: 0 var(--pad); }
  .step.on { display: flex; }
  /* 内容区可滚动，保证底部按钮永远可见 */
  .step-mid {
    flex: 1; min-height: 0; overflow-y: auto;
    display: flex; flex-direction: column; justify-content: flex-start;
    padding: 10px 0 12px;
    overscroll-behavior: contain;
    -webkit-overflow-scrolling: touch;
  }
  .picks { display: flex; flex-direction: column; align-items: flex-start; gap: 14px; margin-top: 30px; }
  /* 选项图标与文字对齐 */
  .pick .pi {
    display: inline-flex; width: 22px; height: 22px;
    align-items: center; justify-content: center;
    font-style: normal; line-height: 1; font-size: 18px;
  }
  .picks-wrap { display: flex; flex-wrap: wrap; gap: 10px; margin: 10px 0 6px; }
  .group-label { font-size: 14px; color: var(--muted); font-weight: 600; margin-top: 12px; }
  .step-foot { padding: 14px 0 calc(26px + env(safe-area-inset-bottom)); }
  .skip { display: block; text-align: center; background: none; border: none; color: var(--muted); font-size: 15px; margin: 0 auto 14px; cursor: pointer; }

  /* 步骤4：选单品（卡片紧凑，一排完整3个） */
  .items-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding-bottom: 12px; }
  .item-cell {
    position: relative; background: var(--card); border-radius: 14px;
    aspect-ratio: 1; padding: 8px; cursor: pointer;
    box-shadow: var(--shadow-card);
    border: 2px solid transparent;
    transition: border-color .15s ease;
    min-width: 0;
  }
  .item-cell.sel { border-color: var(--ink); }
  .item-cell .ck {
    position: absolute; top: 8px; right: 8px;
    width: 20px; height: 20px; border-radius: 50%;
    border: 1.5px solid #d4d4d1; background: #fff;
    display: grid; place-content: center;
    font-size: 11px; color: #fff; font-weight: 900;
  }
  .item-cell.sel .ck { background: var(--ink); border-color: var(--ink); }
  .item-cell.sel .ck::after { content: "✓"; }
  .sel-bar {
    display: flex; justify-content: center; align-items: center; gap: 14px;
    background: var(--card); border-radius: 999px;
    box-shadow: var(--shadow-float);
    padding: 12px 22px; margin: 0 auto 14px;
    font-size: 14.5px; font-weight: 700; width: fit-content;
  }
  .sel-bar button { border: none; background: none; font: inherit; color: var(--ink-2); cursor: pointer; }
</style>
</head>
<body>
<div class="app">

  <div class="pagehead">
    <button class="iconbtn" id="btnBack"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 5 8 12l6.5 7"/></svg></button>
    <span class="grow" style="display:flex;justify-content:center"><span class="progress" id="prog"></span></span>
    <span style="width:40px"></span>
  </div>

  <!-- Step 1 性别 -->
  <section class="step on" data-step="1">
    <div class="step-mid">
      <h1 class="h-display rise">你的性别是？</h1>
      <p class="h-sub rise d1">选择性别，以定制你的专属试衣模特</p>
      <div class="picks rise d2" id="pickGender">
        <button class="pick" data-v="女性"><i class="pi"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="8" r="5"/><path d="M12 13v8M8.5 17.5h7"/></svg></i>女性</button>
        <button class="pick" data-v="男性"><i class="pi"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="10" cy="14" r="5.5"/><path d="M14.2 9.8 20 4M15 4h5v5"/></svg></i>男性</button>
        <button class="pick" data-v="不愿透露"><i class="pi"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="8.5"/><path d="M8 12h8"/></svg></i>不愿透露</button>
      </div>
    </div>
    <div class="step-foot">
      <button class="btn btn-primary btn-block" data-next disabled>下一步</button>
    </div>
  </section>

  <!-- Step 2 职业 -->
  <section class="step" data-step="2">
    <div class="step-mid">
      <h1 class="h-display">你的职业是？</h1>
      <p class="h-sub">我们将根据工作日与周末的场景为你规划不同的造型</p>
      <div id="jobGroups"></div>
    </div>
    <div class="step-foot">
      <button class="skip" data-next-skip>稍后再填</button>
      <button class="btn btn-primary btn-block" data-next disabled>下一步</button>
    </div>
  </section>

  <!-- Step 3 服饰偏好 -->
  <section class="step" data-step="3">
    <div class="step-mid">
      <h1 class="h-display">你的服饰性别偏好是？</h1>
      <p class="h-sub">你可以任意选择自己感兴趣的类型，支持多选</p>
      <div class="picks" id="pickPref">
        <button class="pick" data-v="女装"><i class="pi">👗</i>女装</button>
        <button class="pick" data-v="男装"><i class="pi">👕</i>男装</button>
      </div>
    </div>
    <div class="step-foot">
      <button class="btn btn-primary btn-block" data-next disabled>下一步</button>
    </div>
  </section>

  <!-- Step 4 选单品 -->
  <section class="step" data-step="4" style="padding-top:8px">
    <h1 class="h-display" style="font-size:28px">选择一些单品加入衣橱吧</h1>
    <p class="h-sub" style="margin-bottom:18px">选择你已经拥有的基础款，快速体验电子衣橱</p>
    <div class="scroll-body">
      <div class="items-grid" id="itemsGrid"></div>
    </div>
    <div class="step-foot">
      <div class="sel-bar">
        <button id="btnAll">○ 全选</button>
        <span style="color:var(--line)">|</span>
        <span id="selCount">已选 0 件</span>
      </div>
      <button class="btn btn-primary btn-block" id="btnFinish" disabled>请选择你已有的衣服</button>
    </div>
  </section>
</div>

<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script>
  renderStatusbar();

  const answers = { gender: "", job: "", pref: [] };
  let cur = 1;
  const TOTAL = 4;

  function renderProg() {
    $("#prog").innerHTML = Array.from({ length: TOTAL },
      (_, i) => `<i class="${i < cur ? "on" : ""}"></i>`).join("");
  }
  function goStep(n) {
    cur = n;
    $$(".step").forEach(s => s.classList.toggle("on", +s.dataset.step === n));
    if (n === 4) renderItemsGrid();   // 按偏好动态渲染单品
    renderProg();
  }
  /* 步骤导航防抖：快速连点会跨步误触（如双击"下一步"直接命中下一屏按钮），350ms 内只认第一次 */
  let lastNav = 0;
  function navOk() { if (Date.now() - lastNav < 350) return false; lastNav = Date.now(); return true; }
  $("#btnBack").addEventListener("click", () => {
    if (!navOk()) return;
    if (cur === 1) history.back(); else goStep(cur - 1);
  });
  $$("[data-next]").forEach(b => b.addEventListener("click", () => {
    if (!navOk()) return;
    goStep(cur + 1);
  }));
  $$("[data-next-skip]").forEach(b => b.addEventListener("click", () => {
    if (!navOk()) return;
    /* 跳过=不填职业：清掉误点的职业选择，返回重进时不再高亮 */
    answers.job = "";
    $$("#jobGroups .pick").forEach(x => x.classList.remove("active"));
    $('.step[data-step="2"] [data-next]').disabled = true;
    goStep(cur + 1);
  }));

  /* 单选组 */
  function singlePick(rootSel, key) {
    const root = $(rootSel);
    $$(".pick", root).forEach(p => p.addEventListener("click", () => {
      $$(".pick", root).forEach(x => x.classList.remove("active"));
      p.classList.add("active");
      answers[key] = p.dataset.v;
      $("[data-next]", root.closest(".step")).disabled = false;
    }));
  }
  singlePick("#pickGender", "gender");

  /* 职业 chips */
  $("#jobGroups").innerHTML = Object.entries(JOBS).map(([g, list]) => `
    <div class="group-label">${g}</div>
    <div class="picks-wrap">${list.map(j =>
      `<button class="pick" style="padding:11px 18px;font-size:14.5px" data-v="${j}">${j}</button>`).join("")}
    </div>`).join("");
  $$("#jobGroups .pick").forEach(p => p.addEventListener("click", () => {
    $$("#jobGroups .pick").forEach(x => x.classList.remove("active"));
    p.classList.add("active");
    answers.job = p.dataset.v;
    $("[data-next]", p.closest(".step")).disabled = false;
  }));

  /* 偏好多选 */
  $$("#pickPref .pick").forEach(p => p.addEventListener("click", () => {
    p.classList.toggle("active");
    answers.pref = $$("#pickPref .pick.active").map(x => x.dataset.v);
    $("[data-next]", p.closest(".step")).disabled = answers.pref.length === 0;
  }));

  /* 步骤4：选单品（按第3步的性别偏好展示日常基础款） */
  const picked = new Set();
  let stepItems = [];
  function renderItemsGrid() {
    const g = new Set();
    if (answers.pref.includes("女装")) g.add("f");
    if (answers.pref.includes("男装")) g.add("m");
    if (!g.size) { g.add("f"); g.add("m"); }
    stepItems = ITEMS.filter(i => g.has(i.gender));   // 该性别全部单品（含连体裙）
    /* 返回改偏好后重进：剔除已不在列表里的选中项，避免看不见的衣服进衣橱 */
    const ids = new Set(stepItems.map(i => i.id));
    picked.forEach(id => { if (!ids.has(id)) picked.delete(id); });
    $("#itemsGrid").innerHTML = stepItems.map(it => `
      <div class="item-cell ${picked.has(it.id) ? "sel" : ""}" data-id="${it.id}">
        ${itemImg(it)}
        <span class="ck"></span>
      </div>`).join("");
    $$(".item-cell").forEach(c => c.addEventListener("click", () => {
      const id = c.dataset.id;
      picked.has(id) ? picked.delete(id) : picked.add(id);
      c.classList.toggle("sel", picked.has(id));
      refreshSel();
    }));
    refreshSel();
  }
  function refreshSel() {
    $("#selCount").textContent = `已选 ${picked.size} 件`;
    /* 全选时圆圈变实心 */
    $("#btnAll").textContent =
      (stepItems.length && picked.size === stepItems.length) ? "● 全选" : "○ 全选";
    const btn = $("#btnFinish");
    btn.disabled = picked.size === 0;
    btn.textContent = picked.size === 0 ? "请选择你已有的衣服" : `加入衣橱（${picked.size} 件）`;
  }
  $("#btnAll").addEventListener("click", () => {
    const all = picked.size === stepItems.length;
    picked.clear();
    if (!all) stepItems.forEach(i => picked.add(i.id));
    $$(".item-cell").forEach(c => c.classList.toggle("sel", picked.has(c.dataset.id)));
    refreshSel();
  });
  $("#btnFinish").addEventListener("click", () => {
    if (!navOk()) return;
    Store.set({
      wardrobe: [...picked],
      profile: answers,
      onboarded: true,
    });
    toast("衣橱创建成功");
    setTimeout(() => location.href = "home.html", 600);
  });

  renderProg();
</script>
</body>
</html>

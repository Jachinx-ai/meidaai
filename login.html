<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>登录 · 美搭</title>
<link rel="stylesheet" href="css/base.css">
<style>
  .login-body { flex: 1; display: flex; flex-direction: column; padding: 0 32px; }
  .applogo {
    width: 92px; height: 92px; border-radius: 26px;
    background: var(--ink); color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 32px; font-weight: 900; line-height: 1.1;
    text-align: center; letter-spacing: .02em;
    margin: 96px auto 20px;
    box-shadow: var(--shadow-float);
  }
  .applogo em { font-style: normal; background: var(--grad); -webkit-background-clip: text; background-clip: text; color: transparent; }
  .appname { font-size: 30px; font-weight: 900; text-align: center; }
  .login-tip { font-size: 13px; color: var(--muted); text-align: center; margin: 10px 0 42px; }
  .login-foot { padding: 26px 32px calc(30px + env(safe-area-inset-bottom)); }
</style>
</head>
<body>
<div class="app">

  <div class="login-body">
    <div class="applogo rise">美<em>搭</em></div>
    <div class="appname rise d1">美搭</div>
    <div class="login-tip rise d1">邮箱验证码登录，未注册将自动创建账号</div>

    <div class="field rise d2" style="margin-bottom:14px">
      <input type="email" id="email" placeholder="请输入邮箱地址" autocomplete="email">
    </div>
    <div class="field rise d2" style="margin-bottom:22px">
      <input type="tel" id="code" maxlength="6" placeholder="请输入邮箱验证码" inputmode="numeric">
      <button class="field-act" id="btnSend">获取验证码</button>
    </div>
    <button class="btn btn-primary btn-block rise d3" id="btnLogin" disabled>登录</button>
  </div>

  <div class="login-foot rise d4">
    <label class="agree">
      <input type="checkbox" class="checkbox" id="agreeChk">
      <span>我已阅读并同意 <a href="javascript:;">用户协议</a> 和 <a href="javascript:;">隐私政策</a>，邮箱仅用于账号登录，不会对外泄露</span>
    </label>
  </div>
</div>

<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script>
  renderStatusbar();

  const isEmail = s => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(s);

  function agreeOk() {
    if (!$("#agreeChk").checked) { toast("请先勾选并同意底部协议"); return false; }
    return true;
  }

  /* 调后端；后端不在线（本地双击 HTML 打开）→ 抛 offline，走演示模式 */
  async function api(path, body) {
    let r;
    try {
      r = await fetch(path, {
        method: "POST",
        /* X-Sid：把匿名会话号带给后端，login_success 埋点能绑定 会话↔邮箱（看板归因用） */
        headers: { "Content-Type": "application/json", "X-Sid": Track.sid() },
        body: JSON.stringify(body),
      });
    } catch {
      const e = new Error("offline"); e.offline = true; throw e;
    }
    const data = await r.json().catch(() => ({}));
    if (!r.ok) throw new Error(data.error || "请求失败，请稍后再试");
    return data;
  }

  let demoMode = false;   // 后端不在线时任意 6 位验证码可登录

  function refreshLoginBtn() {
    $("#btnLogin").disabled = !(isEmail($("#email").value.trim()) && /^\d{6}$/.test($("#code").value.trim()));
  }
  $("#email").addEventListener("input", refreshLoginBtn);
  $("#code").addEventListener("input", refreshLoginBtn);

  /* 获取验证码：60s 倒计时防连点 */
  let cd = 0, cdTimer;
  function startCd() {
    cd = 60;
    $("#btnSend").disabled = true;
    cdTimer = setInterval(() => {
      cd--;
      $("#btnSend").textContent = cd > 0 ? `${cd}s 后重发` : "获取验证码";
      if (cd <= 0) { clearInterval(cdTimer); $("#btnSend").disabled = false; }
    }, 1000);
  }

  $("#btnSend").addEventListener("click", async () => {
    if (cd > 0) return;
    if (!agreeOk()) return;
    const email = $("#email").value.trim();
    if (!isEmail(email)) { toast("请先输入正确的邮箱地址"); return; }
    try {
      const data = await api("/api/auth/send-code", { email });
      startCd();
      if (data.devCode) {
        /* 邮件服务未接入：验证码直发，自动填入方便演示 */
        $("#code").value = data.devCode;
        refreshLoginBtn();
        toast(`演示验证码 ${data.devCode} 已自动填入`);
      } else {
        toast("验证码已发送到邮箱");
      }
    } catch (e) {
      if (e.offline) {
        demoMode = true;
        startCd();
        toast("后端未启动，演示模式：任意 6 位验证码可登录");
      } else {
        toast(e.message);
      }
    }
  });

  /* 登录（未注册自动创建账号） */
  $("#btnLogin").addEventListener("click", async () => {
    if (!agreeOk()) return;
    const email = $("#email").value.trim().toLowerCase();
    const code = $("#code").value.trim();
    const btn = $("#btnLogin");
    btn.disabled = true; btn.textContent = "登录中…";
    try {
      let token = "";
      if (!demoMode) {
        const data = await api("/api/auth/login", { email, code });
        token = data.token;
      }
      /* 登录态写进账号资料：账号页展示邮箱，重置演示数据时一并登出 */
      const acc = Store.get().account || {};
      Store.set({ account: { ...acc, email, token } });
      /* 拉回该账号云端的轻量资料（换设备/清缓存后找回档案/收藏/衣橱选择） */
      await pullLightState();
      toast("登录成功");
      setTimeout(() => {
        location.href = Store.get().onboarded ? "home.html" : "onboarding.html";
      }, 500);
    } catch (e) {
      btn.textContent = "登录";
      refreshLoginBtn();
      toast(e.offline ? "网络异常，请稍后再试" : e.message);
    }
  });
</script>
</body>
</html>

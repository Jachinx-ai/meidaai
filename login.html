<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>登录 · AI穿搭助手</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/base.css">
<style>
  .login-body { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 0 32px; }
  .applogo {
    width: 92px; height: 92px; border-radius: 26px;
    background: var(--ink); color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-display); font-size: 17px; line-height: 1.1;
    text-align: center; letter-spacing: .02em;
    margin: 96px auto 20px;
    box-shadow: var(--shadow-float);
  }
  .applogo em { font-style: normal; background: var(--grad); -webkit-background-clip: text; background-clip: text; color: transparent; }
  .appname { font-family: var(--font-display); font-size: 30px; }
  .appname .zh { font-family: var(--font-body); font-weight: 900; }
  .phone-num { font-size: 32px; font-weight: 900; letter-spacing: .04em; margin-top: 78px; }
  .phone-tip { font-size: 12.5px; color: var(--muted); margin: 8px 0 26px; }
  .more-login { background: none; border: none; color: var(--muted); font-size: 15px; margin-top: 34px; cursor: pointer; }
  .login-foot { padding: 26px 32px calc(30px + env(safe-area-inset-bottom)); }
  .oauth-btn { margin-bottom: 14px; font-size: 16px; }
</style>
</head>
<body>
<div class="app">

  <div class="login-body">
    <div class="applogo rise">AI<br><em>穿搭</em></div>
    <div class="appname rise d1">AI<span class="zh">穿搭助手</span></div>

    <div class="phone-num rise d2">193****7983</div>
    <div class="phone-tip rise d2">天翼数字生活账号为您提供号码认证服务</div>

    <button class="btn btn-primary btn-block rise d3" id="btnQuick">一键登录</button>
    <div style="height:14px"></div>
    <button class="btn btn-ghost btn-block rise d3" onclick="if(agreeOk())openSheet('sheetPhone')">其他手机号登录</button>

    <button class="more-login rise d4" onclick="openSheet('sheetMore')">更多登录方式 ›</button>
  </div>

  <div class="login-foot rise d5">
    <label class="agree">
      <input type="checkbox" class="checkbox" id="agreeChk">
      <span>我已阅读并同意 <a href="javascript:;">用户协议</a>、<a href="javascript:;">个人信息保护政策</a>、<a href="javascript:;">账号规则</a> 和 <a href="javascript:;">天翼数字生活账号服务条款</a></span>
    </label>
  </div>
</div>

<!-- 其他手机号登录 Sheet -->
<div class="sheet-mask" id="mask-sheetPhone" onclick="closeSheet('sheetPhone')"></div>
<div class="sheet" id="sheetPhone">
  <div class="sheet-grab"></div>
  <div class="sheet-title">手机号登录
    <button class="sheet-x" onclick="closeSheet('sheetPhone')">✕</button>
  </div>
  <div class="field" style="margin-bottom:14px">
    <input type="tel" id="phone" maxlength="11" placeholder="请输入手机号">
  </div>
  <div class="field" style="margin-bottom:20px">
    <input type="tel" id="smsCode" maxlength="6" placeholder="请输入短信验证码">
    <button class="field-act" id="sendSms">发送验证码</button>
  </div>
  <button class="btn btn-primary btn-block" id="btnPhoneLogin" disabled>登录</button>
</div>

<!-- 更多登录方式 Sheet -->
<div class="sheet-mask" id="mask-sheetMore" onclick="closeSheet('sheetMore')"></div>
<div class="sheet" id="sheetMore">
  <div class="sheet-grab"></div>
  <div class="sheet-title">用其他方式开始
    <button class="sheet-x" onclick="closeSheet('sheetMore')">✕</button>
  </div>
  <button class="btn btn-primary btn-block oauth-btn" onclick="loginGo('Apple')"> 以 Apple 账号继续</button>
  <button class="btn btn-ghost btn-block oauth-btn" onclick="location.href='signup.html'">✉️ 以电子邮箱继续</button>
</div>

<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script>
  renderStatusbar();

  /* iOS 手势返回经 bfcache 恢复时刷新，避免按钮残留“登录中…”态 */
  window.addEventListener("pageshow", e => { if (e.persisted) location.reload(); });

  function agreeOk() {
    if (!$("#agreeChk").checked) { toast("请先勾选并同意底部协议"); return false; }
    return true;
  }
  function loginGo(way) {
    if (!agreeOk()) return;
    toast(way + " 登录成功");
    setTimeout(() => {
      location.href = Store.get().onboarded ? "home.html" : "onboarding.html";
    }, 700);
  }
  /* 手机号 + 短信验证码登录 */
  function phoneCheck() {
    $("#btnPhoneLogin").disabled = !($("#phone").value.length === 11 && $("#smsCode").value.length >= 4);
  }
  $("#phone").addEventListener("input", phoneCheck);
  $("#smsCode").addEventListener("input", phoneCheck);

  let smsCd = 0, smsTimer;
  $("#sendSms").addEventListener("click", () => {
    if (smsCd > 0) return;
    if ($("#phone").value.length !== 11) { toast("请先输入 11 位手机号"); return; }
    toast("验证码已发送");
    smsCd = 60;
    $("#sendSms").disabled = true;
    smsTimer = setInterval(() => {
      smsCd--;
      $("#sendSms").textContent = smsCd > 0 ? `${smsCd}s 后重发` : "发送验证码";
      if (smsCd <= 0) { clearInterval(smsTimer); $("#sendSms").disabled = false; }
    }, 1000);
  });
  $("#btnPhoneLogin").addEventListener("click", () => {
    $("#btnPhoneLogin").textContent = "登录中…";
    setTimeout(() => {
      closeSheet("sheetPhone");
      loginGoDirect();
    }, 800);
  });

  $("#btnQuick").addEventListener("click", () => {
    if (!agreeOk()) return;
    const btn = $("#btnQuick");
    btn.textContent = "登录中…";
    setTimeout(() => loginGoDirect(), 800);
  });
  function loginGoDirect() {
    toast("登录成功");
    setTimeout(() => {
      location.href = Store.get().onboarded ? "home.html" : "onboarding.html";
    }, 500);
  }
</script>
</body>
</html>

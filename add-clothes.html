<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#141416">
<title>添加衣服 · AI穿搭助手</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/base.css">
<style>
  body { background: #141416; }
  .app { background: #141416; }
  .app::before { display: none; }
  .statusbar { color: #fff; }

  /* 入口页（深色，像相机弹层） */
  .entry { flex: 1; display: flex; flex-direction: column; justify-content: flex-end; padding: 0 var(--pad) calc(30px + env(safe-area-inset-bottom)); }
  .entry .down { text-align: center; color: rgba(255,255,255,.5); font-size: 22px; margin-bottom: 26px; cursor: pointer; min-height: 44px; }
  .entry h1 { color: #fff; font-size: 24px; font-weight: 900; margin-bottom: 8px; }
  .entry .hint { color: rgba(255,255,255,.45); font-size: 13px; line-height: 1.8; margin-bottom: 18px; }
  .ways { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 14px; }
  .way {
    background: rgba(255,255,255,.09);
    border: none; border-radius: var(--r-lg);
    padding: 26px 0 20px; cursor: pointer;
    color: rgba(255,255,255,.85);
    display: flex; flex-direction: column; align-items: center; gap: 10px;
    font-size: 14px; font-weight: 600; font-family: var(--font-body);
    transition: background .15s ease;
  }
  .way:active { background: rgba(255,255,255,.16); }
  .way .ic { font-size: 26px; }
  .mailbox {
    background: rgba(255,255,255,.09);
    border-radius: var(--r-lg);
    padding: 18px;
    color: rgba(255,255,255,.85);
  }
  .mailbox .t { display: flex; gap: 10px; align-items: center; font-size: 15px; font-weight: 700; padding-bottom: 12px; border-bottom: 1px solid rgba(255,255,255,.12); }
  .mailbox .addr { display: flex; justify-content: space-between; align-items: center; padding-top: 12px; font-size: 13.5px; color: rgba(255,255,255,.65); }
  .mailbox .copy { border: none; background: none; color: #fff; cursor: pointer; font-size: 15px; min-width: 44px; min-height: 44px; }
</style>
</head>
<body>
<div class="app">

  <div class="entry">
    <div class="down" onclick="history.length > 1 ? history.back() : location.href='home.html'">⌄</div>
    <h1>添加衣服</h1>
    <p class="hint">上传后 AI 自动抠图入橱；不平整的衣服会自动变平铺，一张图里有多件衣服会自动拆分</p>
    <div class="ways">
      <button class="way" id="wayAlbum"><span class="ic">🖼</span>相册导入</button>
      <button class="way" id="wayCam"><span class="ic">📷</span>拍照导入</button>
      <button class="way" id="wayWeb"><span class="ic">🌐</span>网页提取</button>
    </div>
    <div class="mailbox">
      <div class="t">✉️ 衣服商品链接</div>
      <div class="addr">
        <span>3yez2xfhbgamtnm@mail.aiwear.com</span>
        <button class="copy" onclick="toast('邮箱地址已复制')">⧉</button>
      </div>
    </div>
    <input type="file" accept="image/*" id="fileInput" class="hidden">
  </div>
</div>

<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script>
  renderStatusbar();

  /* 选图后：压缩存起来，立刻回衣橱页，AI 抠图由衣橱页在后台完成 */
  async function bgAdd(dataUrl) {
    const small = dataUrl ? await compressImage(dataUrl) : "ph";
    Store.set({ pendingUpload: small });
    location.href = "wardrobe.html";
  }

  $("#wayAlbum").addEventListener("click", () => $("#fileInput").click());
  $("#wayCam").addEventListener("click", () => $("#fileInput").click());
  $("#fileInput").addEventListener("change", e => {
    const f = e.target.files[0];
    if (!f) return;
    const reader = new FileReader();
    reader.onload = () => bgAdd(reader.result);
    reader.readAsDataURL(f);
  });
  $("#wayWeb").addEventListener("click", () => {
    toast("已解析商品链接");
    setTimeout(() => bgAdd(null), 600);
  });
</script>
</body>
</html>

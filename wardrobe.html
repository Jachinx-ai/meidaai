<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>衣橱 · 美搭</title>
<link rel="stylesheet" href="css/base.css">
<style>
  /* 圆形分类筛选 */
  .catbar { display: flex; gap: 16px; overflow-x: auto; scrollbar-width: none; padding: 14px var(--pad) 6px; }
  .catbar::-webkit-scrollbar { display: none; }
  .catdot { flex: none; text-align: center; cursor: pointer; }
  .catdot .cir {
    position: relative;
    width: 62px; height: 62px; border-radius: 50%;
    background: var(--card); box-shadow: var(--shadow-card);
    display: flex; align-items: center; justify-content: center;
    border: 2.5px solid transparent; padding: 10px;
    transition: border-color .15s ease;
    font-size: 26px;   /* 圆圈里的兜底 emoji 尺寸 */
  }
  .catdot.on .cir { border-color: var(--ink); }
  .catdot .cir img { width: 100%; height: 100%; object-fit: contain; }
  .catdot .badge {
    position: absolute; top: -4px; right: -6px;
    background: var(--card); border-radius: 999px;
    font-size: 11px; font-weight: 700; padding: 3px 7px;
    box-shadow: var(--shadow-card);
  }
  .catdot .lbl { display: block; font-size: 12px; font-weight: 500; color: var(--ink-2); margin-top: 7px; }
  .catdot.on .lbl { color: var(--ink); font-weight: 700; }

  /* 单品网格 */
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; padding: 14px var(--pad) 26px; }
  .icard {
    min-width: 0; position: relative;
    background: var(--card); border-radius: var(--r-lg);
    box-shadow: var(--shadow-card); padding: 16px 14px 14px;
    text-align: center; cursor: pointer;
  }
  .icard .del {
    position: absolute; top: 6px; right: 6px; z-index: 2;
    width: 34px; height: 34px; border-radius: 50%;
    border: none; background: var(--fill);
    color: var(--ink-2); font-size: 14px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .icard .del:active { background: var(--fill-2); }
  .icard .imgwrap { height: 128px; display: flex; align-items: center; justify-content: center; }
  .icard img { max-width: 100%; max-height: 100%; object-fit: contain; }
  .match-pill {
    width: 100%; margin-top: 12px;
    border: none; background: var(--fill); color: var(--ink);
    padding: 11px 0; border-radius: 999px;
    font-size: 13px; font-weight: 600; cursor: pointer;
  }
  .match-pill:active { background: var(--fill-2); }

  .empty { text-align: center; color: var(--muted); padding: 70px 40px; font-size: 15px; line-height: 2; }

  /* AI 识别中占位卡（上传后顶在网格最前）：识别阶段一张转圈卡，
     识别完成后按件数变成 N 张进度卡（.split-prog 样式在 base.css），逐件点亮入橱 */
  .icard.scan { position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; min-height: 212px; cursor: default; }
  .scan-ring { width: 34px; height: 34px; border-radius: 50%; border: 3px solid var(--fill); border-top-color: var(--ink); animation: spin .9s linear infinite; }
  .icard.scan .ai-pill { padding: 8px 14px; font-size: 12.5px; font-weight: 700; color: var(--ink-2); }
  @keyframes spin { to { transform: rotate(1turn); } }
</style>
</head>
<body>
<div class="app">

  <div class="pagehead" style="padding-top:14px">
    <div class="h-display rise" style="font-size:28px">衣橱</div>
  </div>

  <div class="catbar rise d1" id="catbar"></div>
  <div class="grid2 rise d2" id="itemGrid"></div>
</div>

<!-- 删除确认弹窗 -->
<div class="modal-mask" id="modalDel">
  <div class="modal">
    <h3>删除衣服</h3>
    <p id="delMsg">删除后，和该衣服相关的搭配也将同步删除。</p>
    <div style="display:flex;gap:12px">
      <button class="btn btn-ghost" style="flex:1" onclick="closeModal('modalDel')">取消</button>
      <button class="btn btn-primary" style="flex:1" id="btnDelOk">确定</button>
    </div>
  </div>
</div>

<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script src="js/ai.js"></script>
<script>
  renderStatusbar();
  renderTabbar("wardrobe");

  let cat = "全部";
  let scanning = false;   /* 识别阶段：网格最前显示一张转圈占位卡 */
  let splits = [];        /* 拆图进度卡：[{target, pct, status: run|fail|done, stop}] */
  function renderCats() {
    const items = wardrobeItems();
    /* 分类空态兜底 emoji：按分类给对应图标（连体裙不再显示衬衫） */
    const CAT_EMOJI = { "全部": "👕", "上衣": "👕", "下装": "👖", "鞋子": "👟", "连体裙": "👗" };
    $("#catbar").innerHTML = CATS.map(c => {
      const list = c === "全部" ? items : items.filter(i => i.cat === c);
      const cover = list[0];
      return `
      <div class="catdot ${c === cat ? "on" : ""}" data-c="${c}">
        <div class="cir">
          ${c === "全部" ? "👕" : (cover ? (cover.dataUrl ? `<img src="${cover.dataUrl}">` : itemImg(cover)) : (CAT_EMOJI[c] || "👕"))}
          <span class="badge">${list.length}</span>
        </div>
        <span class="lbl">${c}</span>
      </div>`;
    }).join("");
    $$(".catdot").forEach(d => d.addEventListener("click", () => {
      cat = d.dataset.c; renderCats(); renderItems();
    }));
  }

  function renderItems() {
    const list = wardrobeItems().filter(i => cat === "全部" || i.cat === cat);
    const scanCard = scanning ? `
      <div class="icard scan">
        <div class="scan-ring"></div>
        <span class="ai-pill">AI 识别整理中…</span>
      </div>` : "";
    /* 拆图进度卡：每件一张，显示模拟进度；失败卡给重试 */
    const splitCards = splits.map((sp, i) => sp.status === "done" ? "" : `
      <div class="icard scan">
        <div class="split-prog">
          <span class="spname">${sp.target.description || sp.target.category || "衣服"}</span>
          ${sp.status === "fail"
            ? `<span class="spfail">生成失败</span><button class="spretry" data-retry="${i}">重试</button>`
            : `<span class="sppct" id="sppct${i}">${sp.pct}%</span>
               <div class="spbar"><i id="spbar${i}" style="width:${sp.pct}%"></i></div>
               <span class="ai-pill" style="padding:5px 12px;font-size:11.5px;color:var(--ink-2)">AI 生成中</span>`}
        </div>
      </div>`).join("");
    const busy = scanning || splits.some(sp => sp.status !== "done");
    $("#itemGrid").innerHTML = (list.length || busy) ? scanCard + splitCards + list.map(it => `
      <div class="icard" data-go="${it.id}">
        <button class="del" data-del="${it.id}">🗑</button>
        <div class="imgwrap">${it.dataUrl ? `<img src="${it.dataUrl}">` : itemImg(it)}</div>
        <button class="match-pill">去搭配</button>
      </div>`).join("")
      : `<div class="empty" style="grid-column:1/-1">这个分类还没有衣服<br>点底部 + 号上传第一件吧</div>`;
    /* 点整卡或「去搭配」→ 带着这件衣服去 AI 搭配试穿 */
    $$("[data-go]").forEach(c => c.addEventListener("click", () =>
      location.href = `tryon.html?item=${c.dataset.go}`));
    $$("[data-retry]").forEach(b => b.addEventListener("click", () => retrySplit(+b.dataset.retry)));
    $$("[data-del]").forEach(b => b.addEventListener("click", e => {
      e.stopPropagation();
      delTarget = b.dataset.del;
      /* 系统衣服会连带隐藏搭配，自己上传的不影响任何搭配，文案分开说 */
      $("#delMsg").textContent = ITEMS.some(i => i.id === delTarget)
        ? "删除后，含这件衣服的搭配也将同步隐藏。"
        : "确定删除这件自己上传的衣服吗？";
      openModal("modalDel");
    }));
  }

  /* 删除衣服（相关搭配在各页通过 availableOutfits 同步隐藏） */
  let delTarget = null;
  $("#btnDelOk").addEventListener("click", () => {
    const s = Store.get();
    const isSystem = ITEMS.some(i => i.id === delTarget);
    Store.set({
      wardrobe: s.wardrobe.filter(id => id !== delTarget),
      customItems: s.customItems.filter(c => c.id !== delTarget),
      /* 系统单品记入删除名单 → 含它的搭配全站同步隐藏 */
      deletedItems: isSystem ? [...s.deletedItems, delTarget] : s.deletedItems,
    });
    closeModal("modalDel");
    toast(isSystem ? "已删除，相关搭配已同步移除" : "已删除");
    renderCats(); renderItems();
  });

  renderCats(); renderItems();

  /* 识别/生成进行中离开页面会静默丢弃这次已付费的调用：离开前弹原生确认拦一道
     （beforeunload 在 iOS Safari 上可能不生效，属尽力而为的兜底） */
  window.addEventListener("beforeunload", (e) => {
    if (!scanning && !splits.some(sp => sp.status === "run")) return;
    e.preventDefault();
    e.returnValue = "";
  });

  /* ---------- 拆图卡片进度流 ----------
     识别（快）→ 按件数铺进度卡 → 逐件生成（AI.splitUpload 限并发2）→
     哪件先完成哪张卡先入橱点亮；失败卡留在原地可重试。
     进度为模拟值（fakeProgress 逼近96%），真实完成时跳100。 */
  let splitPhoto = null;   /* 本次拆图的原照片（单件重试用） */

  function setPct(i, p) {
    const sp = splits[i];
    if (!sp || sp.status !== "run") return;
    sp.pct = Math.max(sp.pct, p);
    const pctEl = $("#sppct" + i), barEl = $("#spbar" + i);
    if (pctEl) pctEl.textContent = sp.pct + "%";
    if (barEl) barEl.style.width = sp.pct + "%";
  }

  async function finishOne(i, d) {
    const sp = splits[i];
    sp.stop?.();
    /* 完成瞬间跳 100%，停留一拍再点亮入橱 */
    sp.pct = 100;
    const pctEl = $("#sppct" + i), barEl = $("#spbar" + i);
    if (pctEl) pctEl.textContent = "100%";
    if (barEl) barEl.style.width = "100%";
    await new Promise(r => setTimeout(r, 380));

    const item = {
      id: "c" + Date.now() + "_" + i,
      name: d.name || "我的单品",
      cat: ["上衣", "下装", "鞋子", "连体裙"].includes(d.category) ? d.category : "上衣",
      ph: "tee",
      /* 生成图入橱前：裁白边+方形规整+压缩，修复高瘦画布在方形卡片里显得极小 */
      dataUrl: await trimToSquare(d.image || splitPhoto),
      labels: d.labels || null,
    };
    const saved = Store.set({ customItems: [item, ...Store.get().customItems] });   /* 新完成排最前 */
    sp.status = "done";
    renderCats(); renderItems();
    if (saved !== false) toast(`「${item.name}」已入橱`);
    /* 全部尘埃落定后的汇总提示 */
    if (!splits.some(x => x.status === "run")) {
      const ok = splits.filter(x => x.status === "done").length;
      const fail = splits.filter(x => x.status === "fail").length;
      if (ok > 1 || fail) toast(fail ? `${ok} 件已入橱，${fail} 件失败可点卡片重试` : `AI 拆分出 ${ok} 件，已全部入橱`);
    }
  }

  function failOne(i) {
    const sp = splits[i];
    sp.stop?.();
    sp.status = "fail";
    renderItems();
  }

  async function retrySplit(i) {
    const sp = splits[i];
    if (!sp || sp.status !== "fail" || !splitPhoto) return;
    sp.status = "run"; sp.pct = 0;
    renderItems();
    sp.stop = fakeProgress(p => setPct(i, p));
    try {
      const r = await AI.segmentOne(splitPhoto, sp.target);
      finishOne(i, r.item);
    } catch (e) {
      console.warn("重试仍失败", e);
      failOne(i);
    }
  }

  async function runSplit(photo) {
    splitPhoto = photo;
    scanning = true;
    renderItems();
    toast("上传成功，AI 正在识别衣服…");
    try {
      await AI.splitUpload(photo, {
        onDetected(targets) {
          scanning = false;
          splits = targets.map(target => ({ target, pct: 0, status: "run", stop: null }));
          renderItems();
          splits.forEach((sp, i) => { sp.stop = fakeProgress(p => setPct(i, p)); });
          if (targets.length > 1) toast(`识别到 ${targets.length} 件衣服，AI 处理中…`);
        },
        onItemDone: (i, item) => finishOne(i, item),
        onItemFail: (i, e) => { console.warn("单件生成失败", e); failOne(i); },
      });
    } catch (e) {
      /* 识别这步就挂了：整次失败 */
      console.warn("识别失败", e);
      scanning = false;
      renderItems();
      toast("识别失败，请重新上传");
    }
  }

  /* 从添加衣服页带回的上传 */
  const pending = Store.get().pendingUpload;
  if (pending) {
    /* 先清掉再识别：识别期间离开页面再回来，不会重复触发付费识别 */
    Store.set({ pendingUpload: null });
    if (pending === "ph") {
      /* 网页提取演示路径：假延时后入一件占位款 */
      scanning = true;
      renderItems();
      setTimeout(() => {
        Store.set({ customItems: [{ id: "c" + Date.now(), name: "我的单品", cat: "上衣", ph: "tee", dataUrl: null }, ...Store.get().customItems] });
        scanning = false;
        renderCats(); renderItems();
        toast("已添加到衣橱");
      }, 900);
    } else {
      runSplit(pending);
    }
  }
</script>
</body>
</html>

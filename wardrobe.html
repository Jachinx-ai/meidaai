<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>衣橱 · 美搭</title>
<link rel="stylesheet" href="css/base.css">
<style>
  /* 圆形分类筛选 */
  .catbar { display: flex; gap: 16px; overflow-x: auto; scrollbar-width: none; padding: 14px var(--pad) 6px; }
  .catbar::-webkit-scrollbar { display: none; }
  .catdot { flex: none; text-align: center; cursor: pointer; }
  .catdot .cir {
    position: relative;
    width: 62px; height: 62px; border-radius: 50%;
    background: var(--card); box-shadow: var(--shadow-card);
    display: flex; align-items: center; justify-content: center;
    border: 2.5px solid transparent; padding: 10px;
    transition: border-color .15s ease;
    font-size: 26px;   /* 圆圈里的兜底 emoji 尺寸 */
  }
  .catdot.on .cir { border-color: var(--ink); }
  .catdot .cir img { width: 100%; height: 100%; object-fit: contain; }
  .catdot .badge {
    position: absolute; top: -4px; right: -6px;
    background: var(--card); border-radius: 999px;
    font-size: 11px; font-weight: 700; padding: 3px 7px;
    box-shadow: var(--shadow-card);
  }
  .catdot .lbl { display: block; font-size: 12px; font-weight: 500; color: var(--ink-2); margin-top: 7px; }
  .catdot.on .lbl { color: var(--ink); font-weight: 700; }

  /* 单品网格 */
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; padding: 14px var(--pad) 26px; }
  .icard {
    min-width: 0; position: relative;
    background: var(--card); border-radius: var(--r-lg);
    box-shadow: var(--shadow-card); padding: 16px 14px 14px;
    text-align: center; cursor: pointer;
  }
  .icard .del {
    position: absolute; top: 6px; right: 6px; z-index: 2;
    width: 34px; height: 34px; border-radius: 50%;
    border: none; background: var(--fill);
    color: var(--ink-2); font-size: 14px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }
  .icard .del:active { background: var(--fill-2); }
  .icard .imgwrap { height: 128px; display: flex; align-items: center; justify-content: center; }
  .icard img { max-width: 100%; max-height: 100%; object-fit: contain; }
  .match-pill {
    width: 100%; margin-top: 12px;
    border: none; background: var(--fill); color: var(--ink);
    padding: 11px 0; border-radius: 999px;
    font-size: 13px; font-weight: 600; cursor: pointer;
  }
  .match-pill:active { background: var(--fill-2); }

  .empty { text-align: center; color: var(--muted); padding: 70px 40px; font-size: 15px; line-height: 2; }

  /* 单品图放大预览浮层：点图打开、点任意处关闭 */
  .preview-mask {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(0, 0, 0, .85);
    display: none; align-items: center; justify-content: center;
    padding: 28px;
  }
  .preview-mask.on { display: flex; }
  .preview-mask img { max-width: 100%; max-height: 100%; object-fit: contain; border-radius: 14px; }

  /* AI 识别中占位卡（上传后顶在网格最前）：识别阶段一张转圈卡，
     识别完成后按件数变成 N 张进度卡（.split-prog 样式在 base.css），逐件点亮入橱 */
  .icard.scan { position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; min-height: 212px; cursor: default; }
  .scan-ring { width: 34px; height: 34px; border-radius: 50%; border: 3px solid var(--fill); border-top-color: var(--ink); animation: spin .9s linear infinite; }
  .icard.scan .ai-pill { padding: 8px 14px; font-size: 12.5px; font-weight: 700; color: var(--ink-2); }
  @keyframes spin { to { transform: rotate(1turn); } }
</style>
</head>
<body>
<div class="app">

  <div class="pagehead" style="padding-top:14px">
    <div class="h-display rise" style="font-size:28px">衣橱</div>
  </div>

  <div class="catbar rise d1" id="catbar"></div>
  <div class="grid2 rise d2" id="itemGrid"></div>
</div>

<!-- 删除确认弹窗 -->
<div class="modal-mask" id="modalDel">
  <div class="modal">
    <h3>删除衣服</h3>
    <p id="delMsg">删除后，和该衣服相关的搭配也将同步删除。</p>
    <div style="display:flex;gap:12px">
      <button class="btn btn-ghost" style="flex:1" onclick="closeModal('modalDel')">取消</button>
      <button class="btn btn-primary" style="flex:1" id="btnDelOk">确定</button>
    </div>
  </div>
</div>

<!-- 单品图放大预览 -->
<div class="preview-mask" id="previewMask"><img id="previewImg" src="" alt="单品预览"></div>

<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script src="js/ai.js"></script>
<script>
  renderStatusbar();
  renderTabbar("wardrobe");

  let cat = "全部";
  let localScan = false;  /* 离线/演示路径的即时识别态（后台任务的进度卡由 segCardList 提供） */

  /* 单品图放大预览 */
  function openPreview(src) {
    $("#previewImg").src = src;
    $("#previewMask").classList.add("on");
  }
  $("#previewMask").addEventListener("click", () => $("#previewMask").classList.remove("on"));
  function renderCats() {
    const items = wardrobeItems();
    /* 分类空态兜底 emoji：按分类给对应图标（连体裙不再显示衬衫） */
    const CAT_EMOJI = { "全部": "👕", "上衣": "👕", "下装": "👖", "鞋子": "👟", "连体裙": "👗" };
    $("#catbar").innerHTML = CATS.map(c => {
      const list = c === "全部" ? items : items.filter(i => i.cat === c);
      const cover = list[0];
      return `
      <div class="catdot ${c === cat ? "on" : ""}" data-c="${c}">
        <div class="cir">
          ${c === "全部" ? "👕" : (cover ? (cover.dataUrl ? `<img src="${cover.dataUrl}">` : itemImg(cover)) : (CAT_EMOJI[c] || "👕"))}
          <span class="badge">${list.length}</span>
        </div>
        <span class="lbl">${c}</span>
      </div>`;
    }).join("");
    $$(".catdot").forEach(d => d.addEventListener("click", () => {
      cat = d.dataset.c; renderCats(); renderItems();
    }));
  }

  function renderItems() {
    const list = wardrobeItems().filter(i => cat === "全部" || i.cat === cat);
    /* 离线/演示路径的即时识别占位卡 */
    const localCard = localScan ? `
      <div class="icard scan">
        <div class="scan-ring"></div>
        <span class="ai-pill">AI 识别整理中…</span>
      </div>` : "";
    /* 后台拆分任务进度卡：识别中一张、识别后每件一张，跨页面由轮询快照驱动
       （segCardList / segCardInner 在 js/app.js，试穿抽屉同款） */
    const segCards = segCardList();
    const splitCards = segCards.map(c => `<div class="icard scan">${segCardInner(c)}</div>`).join("");
    const busy = localScan || segCards.length > 0;
    $("#itemGrid").innerHTML = (list.length || busy) ? localCard + splitCards + list.map(it => `
      <div class="icard">
        <button class="del" data-del="${it.id}">🗑</button>
        <div class="imgwrap" data-view>${it.dataUrl ? `<img src="${it.dataUrl}">` : itemImg(it)}</div>
        <button class="match-pill" data-go="${it.id}">去搭配</button>
      </div>`).join("")
      : `<div class="empty" style="grid-column:1/-1">这个分类还没有衣服<br>点底部 + 号上传第一件吧</div>`;
    /* 只有「去搭配」按钮跳转搭配；点图片区域放大预览、不跳转 */
    $$("[data-go]").forEach(b => b.addEventListener("click", () =>
      location.href = `tryon.html?item=${b.dataset.go}`));
    $$("[data-view]").forEach(w => w.addEventListener("click", () => {
      const src = w.querySelector("img")?.src;
      if (src) openPreview(src);
    }));
    bindSegRetry();
    $$("[data-del]").forEach(b => b.addEventListener("click", e => {
      e.stopPropagation();
      delTarget = b.dataset.del;
      /* 系统衣服会连带隐藏搭配，自己上传的不影响任何搭配，文案分开说 */
      $("#delMsg").textContent = ITEMS.some(i => i.id === delTarget)
        ? "删除后，含这件衣服的搭配也将同步隐藏。"
        : "确定删除这件自己上传的衣服吗？";
      openModal("modalDel");
    }));
  }

  /* 删除衣服（相关搭配在各页通过 availableOutfits 同步隐藏） */
  let delTarget = null;
  $("#btnDelOk").addEventListener("click", () => {
    const s = Store.get();
    const isSystem = ITEMS.some(i => i.id === delTarget);
    Store.set({
      wardrobe: s.wardrobe.filter(id => id !== delTarget),
      customItems: s.customItems.filter(c => c.id !== delTarget),
      /* 系统单品记入删除名单 → 含它的搭配全站同步隐藏 */
      deletedItems: isSystem ? [...s.deletedItems, delTarget] : s.deletedItems,
    });
    closeModal("modalDel");
    toast(isSystem ? "已删除，相关搭配已同步移除" : "已删除");
    renderCats(); renderItems();
  });

  renderCats(); renderItems();

  /* ---------- 拆图上传（后台任务 + 逐件进度卡） ----------
     提交即返回 jobId（识别与逐件生成都在服务器跑，用户可离开本页）；
     进度卡由 app.js 全局轮询的快照驱动，哪件先生成好哪件先入橱点亮，
     失败卡可单件重试。离线时走本地模拟即时入橱。 */
  async function startSplitJob(photo) {
    Track.send("split_submit", { from: "wardrobe" });
    try {
      const r = await AI.segmentStart(photo);
      if (r.jobId) {
        Store.set({ pendingSegments: [...(Store.get().pendingSegments || []), { jobId: r.jobId, ts: Date.now(), landed: [] }] });
        renderItems();
        toast("上传成功，AI 正在整理，可离开本页");
        pollSegmentJobs();   /* 立即拉一次，尽快出识别结果的进度卡 */
      } else if (r.local) {
        /* 离线回退：本地模拟即时入橱 */
        localScan = true;
        renderItems();
        await new Promise(rr => setTimeout(rr, 1200));
        const items = await buildSegmentItems(r.local);
        const saved = Store.set({ customItems: [...items, ...Store.get().customItems] });
        localScan = false;
        renderCats(); renderItems();
        if (saved !== false) toast(items.length > 1 ? `AI 拆分出 ${items.length} 件，已入橱` : "已添加到衣橱");
      }
    } catch (e) {
      console.warn("发起拆分失败", e);
      localScan = false;
      renderItems();
      /* 401/429 已由 ai.js 统一提示过（e.handled），别再用通用文案覆盖 */
      if (!e || !e.handled) toast("上传失败，请重新试一次");
    }
  }

  /* 后台任务状态推进/完成入橱后：本页在则实时刷新 */
  window.addEventListener("segments-updated", () => { renderCats(); renderItems(); });

  /* 从添加衣服页带回的上传 */
  const pending = Store.get().pendingUpload;
  if (pending) {
    /* 先清掉：期间离开本页再回来，不会重复触发 */
    Store.set({ pendingUpload: null });
    if (pending === "ph") {
      /* 演示占位路径：本地即时入橱 */
      localScan = true;
      renderItems();
      setTimeout(() => {
        Store.set({ customItems: [{ id: "c" + Date.now(), name: "我的单品", cat: "上衣", ph: "tee", dataUrl: null }, ...Store.get().customItems] });
        localScan = false;
        renderCats(); renderItems();
        toast("已添加到衣橱");
      }, 900);
    } else {
      startSplitJob(pending);
    }
  }
</script>
</body>
</html>

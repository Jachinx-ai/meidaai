<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#f2f2ef">
<title>模特试穿 · 美搭</title>
<link rel="stylesheet" href="css/base.css">
<style>
  body { background: #f2f2ef; }
  /* 锁定为一屏：模特舞台固定不随页面滚走，只有抽屉内的衣服网格滚动（同 onboarding 的做法） */
  .app { background: #ecece9; height: 100dvh; min-height: 0; }
  /* 本页顶部颜色跟随模特图（syncStageBg），关掉全站薄荷色顶部渐变，避免出现割裂色条 */
  .app::before { display: none; }
  /* 模特舞台 */
  .stage {
    position: relative;
    height: 56dvh;
    display: flex; align-items: flex-end; justify-content: center;
    background: linear-gradient(180deg, #f2f2ef 0%, #e6e6e2 100%);
    overflow: hidden;
  }
  .model-wrap { position: relative; height: 96%; display: flex; align-items: flex-end; justify-content: center; }
  .model-wrap img.base { height: 100%; width: auto; max-width: 88vw; object-fit: contain; display: block; }
  /* AI 生成的整图结果（真模型接入后） */
  .model-wrap img.gen { height: 100%; width: auto; max-width: 88vw; object-fit: contain; display: block; border-radius: 18px; }
  /* 本地叠图合成：按分类定位 */
  .worn {
    position: absolute; left: 50%; transform: translateX(-50%);
    object-fit: contain;
    filter: drop-shadow(0 4px 10px rgba(16,16,18,.18));
    pointer-events: none;
  }
  .worn.cat-上衣   { top: 16%; height: 30%; max-width: 72%; }
  .worn.cat-连体裙 { top: 16%; height: 52%; max-width: 66%; }
  .worn.cat-下装   { top: 43%; height: 38%; max-width: 60%; }
  .worn.cat-鞋子   { bottom: 0; height: 13%; max-width: 48%; }

  .stage-top {
    position: absolute; top: 8px; left: var(--pad); right: var(--pad);
    display: flex; align-items: center; z-index: 5;
  }
  .model-switch {
    width: 46px; height: 46px; border-radius: 50%;
    border: 2px solid #fff; background: var(--fill);
    cursor: pointer;
    box-shadow: var(--shadow-card);
    display: flex; align-items: center; justify-content: center; font-size: 18px;
    position: relative;
  }
  /* 圆形裁剪放在图片上而不是容器上，替换角标才能完整浮在圆外不被切割 */
  .model-switch img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
  /* 切换模特角标：矢量双箭头（文字符号⇄发虚不居中），白描边与头像分开 */
  .model-switch::after {
    content: ""; position: absolute; right: -5px; top: -5px;
    width: 20px; height: 20px; border-radius: 50%;
    border: 2px solid #fff;
    background: var(--ink) url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8.5h12.5M15 4.5l4 4-4 4"/><path d="M18 15.5H5.5M9 11.5l-4 4 4 4"/></svg>') center/11px 11px no-repeat;
  }
  .stage-side {
    position: absolute; right: var(--pad); top: 50%; transform: translateY(-70%);
    display: flex; flex-direction: column; gap: 12px; z-index: 5;
  }
  .ai-match {
    position: absolute; right: var(--pad); bottom: 44px; z-index: 6;
    padding: 10px 16px; min-height: 44px;
    font-size: 13px; font-weight: 600; cursor: pointer;
    display: flex; align-items: center; gap: 6px;
    box-shadow: var(--shadow-float);
  }
  /* ✦ 星标单独控制大小并与文字垂直居中（跟随字号在部分手机上偏小且不齐） */
  .ai-match .star { font-size: 17px; line-height: 1; display: inline-block; }
  .ai-match.off {
    background-image: linear-gradient(var(--card), var(--card)),
      linear-gradient(96deg, #dcdcd9, #dcdcd9);
    color: var(--muted);
    box-shadow: none;
  }
  /* 生成中的整页遮罩：盖住模特区+抽屉，生成结束（成功/失败）才撤（产品负责人定） */
  .gen-loading {
    position: fixed; inset: 0; z-index: 100;
    display: none; flex-direction: column; align-items: center; justify-content: center; gap: 16px;
    background: rgba(242,242,239,.72);
    backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
  }
  .gen-loading.show { display: flex; }
  .gen-loading .spinner {
    width: 36px; height: 36px; border-radius: 50%;
    border: 3px solid rgba(16,16,18,.14); border-top-color: var(--ink);
    animation: gspin .8s linear infinite;
  }
  .gen-loading .gen-text {
    padding: 10px 18px; border-radius: 999px;
    background: rgba(16,16,18,.85); color: #fff;
    font-size: 14px; font-weight: 600; white-space: nowrap;
  }
  /* 生成进度条（模拟值，与拆图卡同款 AI 渐变） */
  .gen-loading .gen-bar {
    width: 190px; height: 5px; border-radius: 3px;
    background: rgba(16,16,18,.12); overflow: hidden;
  }
  .gen-loading .gen-bar i {
    display: block; height: 100%; width: 0%;
    border-radius: 3px; background: var(--grad);
    transition: width .35s linear;
  }
  .gen-loading .gen-pct {
    font-size: 13px; font-weight: 800; color: var(--ink-2);
    font-variant-numeric: tabular-nums;
    margin-top: -6px;   /* 与进度条收紧一点 */
  }
  @keyframes gspin { to { transform: rotate(360deg); } }

  /* 底部抽屉 */
  .drawer {
    flex: 1;
    background: #1b1b1e; color: #fff;
    border-radius: 26px 26px 0 0;
    margin-top: -22px;
    display: flex; flex-direction: column;
    z-index: 4; position: relative;
    min-height: 0;
  }
  /* 抽屉把手：可按住上下拖动（横线是视觉，外层是 22px 高的手势热区） */
  .drawer .grab {
    display: flex; align-items: center; justify-content: center;
    height: 22px; margin: 4px 0 0;
    touch-action: none; cursor: grab;
  }
  .drawer .grab::before {
    content: ""; width: 42px; height: 4.5px; border-radius: 3px;
    background: rgba(255,255,255,.22);
  }
  .stage.snap { transition: height .25s ease; }
  .dtabs { display: flex; justify-content: center; gap: 44px; padding: 8px 0 2px; }
  .dtabs button {
    background: none; border: none; cursor: pointer;
    font-family: var(--font-body);
    color: rgba(255,255,255,.45); font-size: 17px; font-weight: 700;
    padding: 6px 2px; position: relative;
  }
  .dtabs button.on { color: #fff; }
  .dtabs button.on::after {
    content: ""; position: absolute; left: 50%; transform: translateX(-50%); bottom: -3px;
    width: 24px; height: 3px; border-radius: 2px; background: #fff;
  }
  .dchips { display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; padding: 14px var(--pad) 10px; }
  .dchips::-webkit-scrollbar { display: none; }
  .dchip {
    flex: none; border: none; cursor: pointer;
    padding: 8px 16px; border-radius: 999px;
    background: rgba(255,255,255,.1); color: rgba(255,255,255,.75);
    font-size: 13px; font-weight: 600;
  }
  .dchip.on { background: #fff; color: var(--ink); }
  .dgrid {
    flex: 1; min-height: 0; overflow-y: auto;
    overscroll-behavior: contain;        /* 滑到底不再把手势传给外层，避免"卡住滑不动" */
    -webkit-overflow-scrolling: touch;
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
    padding: 14px var(--pad) calc(20px + env(safe-area-inset-bottom));
    align-content: start;
  }
  .dgrid > * { min-width: 0; }
  .dgrid.pt { padding-top: 18px; }
  .dcell {
    background: #fff; border-radius: 14px;
    /* 固定高度：不用 aspect-ratio（部分手机浏览器按图片内容撑高，衣服卡会比+号卡高） */
    height: 124px; padding: 10px;
    cursor: pointer; position: relative;
    border: 2px solid transparent;
    overflow: hidden;
  }
  .dcell.on {
    border: 3px solid transparent;
    background-image: linear-gradient(#fff, #fff), var(--grad);   /* 渐变描边，加粗更醒目 */
    background-origin: border-box;
    background-clip: padding-box, border-box;
  }
  .dcell img { width: 100%; height: 100%; object-fit: contain; display: block; }
  .dcell.add {
    background: rgba(255,255,255,.08);
    display: flex; align-items: center; justify-content: center;
    color: rgba(255,255,255,.7); font-size: 26px; font-weight: 300;
    border: 1.5px dashed rgba(255,255,255,.25);
  }
  .dcell .combo { display: grid; grid-template-columns: 1fr 1fr; gap: 2px; height: 100%; align-content: center; }
  .dcell .combo img { aspect-ratio: 1; height: auto; }
  /* 拆图进度卡（.split-prog 样式在 base.css；抽屉格子小，字号收紧） */
  .dcell.scan { cursor: default; }
  .dcell.scan .split-prog { gap: 5px; padding: 6px; }
  .dcell.scan .sppct { font-size: 13px; }
  .dcell.scan .spname { font-size: 11px; }
  .dcell.scan .spretry { padding: 5px 12px; font-size: 11.5px; }
</style>
</head>
<body>
<div class="app">

  <div class="stage">
    <div class="stage-top">
      <button class="iconbtn" onclick="history.length > 1 ? history.back() : location.href='home.html'"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 5 8 12l6.5 7"/></svg></button>
      <span class="grow"></span>
      <div class="model-switch" id="modelSwitch" title="切换模特"></div>
    </div>

    <div class="model-wrap" id="modelWrap">
      <img class="base" src="assets/ph/model.svg" id="modelImg" alt="试衣模特">
    </div>

    <div class="stage-side">
      <button class="iconbtn" id="btnFav" title="收藏">★</button>
    </div>

    <button class="btn ai-pill ai-match" id="btnAI"><span class="star">✦</span> AI 搭配我的衣服</button>
    <div class="gen-loading" id="genLoading">
      <div class="spinner"></div>
      <div class="gen-text">✦ 穿搭生成中，请耐心等待…</div>
      <div class="gen-bar"><i id="genBarFill"></i></div>
      <span class="gen-pct" id="genPct">0%</span>
    </div>
  </div>

  <div class="drawer">
    <div class="grab"></div>
    <div class="dtabs">
      <button class="on" data-t="mine">我的衣服</button>
      <button data-t="outfit">穿搭</button>
    </div>

    <div id="paneMine" style="display:flex;flex-direction:column;flex:1;min-height:0">
      <div class="dchips" id="catChips"></div>
      <div class="dgrid" id="mineGrid"></div>
    </div>

    <div id="paneOutfit" class="hidden" style="flex-direction:column;flex:1;min-height:0">
      <div class="dchips" id="sceneChipsD"></div>
      <div class="dgrid" id="outfitGrid"></div>
    </div>
  </div>
</div>

<input type="file" accept="image/*" id="fileInput" class="hidden">

<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script src="js/ai.js"></script>
<script>
  renderStatusbar();

  const qs = new URLSearchParams(location.search);
  let wearing = [];           // 当前上身的单品 id
  let curOutfitId = null;
  let aiAround = null;
  let genImage = null;        // 真模型返回的整图结果（占位实现下为 null）
  let generating = false;     // 是否正在生成（生成中显示加载态，不显示临时叠图）
  let offlineOverlay = false; // 无密钥/后端不在线的演示模式：兜底允许平铺叠图（双击HTML也能用）；
                              // 线上真生成失败不叠图——保持台上原样并 toast 重试

  /* 初始状态：?outfit= / ?items= / ?item= */
  if (qs.get("outfit")) {
    const o = OUTFITS.find(x => x.id === qs.get("outfit"));
    if (o) { wearing = [...o.items]; curOutfitId = o.id; }
  } else if (qs.get("items")) {
    wearing = qs.get("items").split(",").filter(id => itemById(id));
  } else if (qs.get("item")) {
    wearing = [qs.get("item")];
    aiAround = qs.get("item");
  } else {
    wearing = [...OUTFITS[0].items]; curOutfitId = OUTFITS[0].id;
  }

  /* ---------- 模特与上身合成 ---------- */
  function curModel() {
    const s = Store.get();
    return s.models.find(x => x.id === s.curModel) || s.models[0];
  }
  function itemSrc(it) {
    return it.dataUrl || `assets/real/${it.id}.png`;
  }

  /* 舞台底色自动取当前展示图片的边缘颜色，让照片与背景无缝衔接（占满上半屏） */
  let stageCols = null;
  function syncStageBg(src) {
    const im = new Image();
    im.onload = () => {
      try {
        const c = document.createElement("canvas");
        c.width = im.width; c.height = im.height;
        const x = c.getContext("2d");
        x.drawImage(im, 0, 0);
        const col = (X, Y) => { const d = x.getImageData(X, Y, 1, 1).data; return `rgb(${d[0]},${d[1]},${d[2]})`; };
        stageCols = [col(3, 3), col(3, im.height - 4)];
        $(".stage").style.background = `linear-gradient(180deg, ${stageCols[0]} 0%, ${stageCols[1]} 100%)`;
        /* 页面外围与手机状态栏也跟着照片同色，整页无缝 */
        $(".app").style.background = stageCols[0];
        document.body.style.background = stageCols[0];
        const tm = document.querySelector('meta[name="theme-color"]');
        if (tm) tm.content = stageCols[0];
      } catch {}
    };
    im.src = src;
  }

  /* 舞台渲染：有 AI 生成图用生成图，否则模特图 + 衣服按分类叠放 */
  /* 加载态开关：显示/隐藏"生成中"整页遮罩。
     进度条为模拟值（生图无真实进度）：先快后慢逼近 96%，完成瞬间跳满停一拍再收 */
  let genPctTimer = null, genPctVal = 0, genHideSeq = 0;
  function paintGenPct() {
    $("#genBarFill").style.width = genPctVal + "%";
    $("#genPct").textContent = Math.round(genPctVal) + "%";
  }
  function setLoading(on) {
    const mask = $("#genLoading");
    if (on) {
      genHideSeq++;                      /* 取消未执行的延迟隐藏，防快速连开被误关 */
      if (!mask.classList.contains("show")) {
        genPctVal = 0;
        paintGenPct();
        clearInterval(genPctTimer);
        genPctTimer = setInterval(() => {
          genPctVal = Math.min(96, genPctVal + Math.max(0.4, (96 - genPctVal) * 0.03));
          paintGenPct();
        }, 350);
      }
      mask.classList.add("show");
      return;
    }
    if (mask.classList.contains("show")) {
      clearInterval(genPctTimer);
      genPctVal = 100;
      paintGenPct();
      const seq = ++genHideSeq;
      setTimeout(() => { if (seq === genHideSeq) mask.classList.remove("show"); }, 300);
    }
  }

  function renderStage() {
    const m = curModel();
    const wrap = $("#modelWrap");
    if (generating) {
      /* 生成等待中：整页遮罩盖住模特与抽屉；台上保留旧生成图（没有则模特底图），失败时旧图不丢 */
      if (genImage) {
        wrap.innerHTML = `<img class="gen" src="${genImage}" alt="试穿效果">`;
        syncStageBg(genImage);
      } else {
        const modelSrc = m.dataUrl || defaultModelSrc();
        syncStageBg(modelSrc);
        wrap.innerHTML = `<img class="base" id="modelImg" src="${modelSrc}"
            onerror="this.onerror=null;this.src='assets/ph/model.svg'"
            style="${m.dataUrl ? "border-radius:18px" : ""}" alt="试衣模特">`;
      }
      setLoading(true);
      return;
    }
    if (genImage) {
      /* 生图模型已把鞋子一起生成，直接展示整图，不再前端叠鞋 */
      wrap.innerHTML = `<img class="gen" src="${genImage}" alt="试穿效果">`;
      syncStageBg(genImage);
      setLoading(false);
      return;
    }
    const modelSrc = m.dataUrl || defaultModelSrc();
    syncStageBg(modelSrc);
    setLoading(false);
    const base = `<img class="base" id="modelImg"
        src="${m.dataUrl || defaultModelSrc()}"
        onerror="this.onerror=null;this.src='assets/ph/model.svg'"
        style="${m.dataUrl ? "border-radius:18px" : ""}" alt="试衣模特">`;
    /* 线上真生成失败走不到叠图：doTryon 保留旧生成图并 toast，这里只剩"什么都没穿"的纯模特 */
    if (!offlineOverlay) { wrap.innerHTML = base; return; }
    /* 无密钥/后端不在线的演示模式：平铺叠图保底，双击 HTML 也能用 */
    wrap.innerHTML = base +
      wearing.map(id => {
        const it = itemById(id);
        if (!it) return "";
        return `<img class="worn cat-${it.cat}" src="${itemSrc(it)}"
          onerror="phFallback(this,'${it.ph}')" alt="${it.name}">`;
      }).join("");
  }

  /* ---------- 真实试穿：每次换装自动生成 ----------
     系统衣服/默认模特是图片文件，先转成 dataURL 再发给模型；
     衣服平铺图铺白底转 JPEG（透明 PNG 直接转会发黑）。转换结果缓存。 */
  const srcCache = new Map();
  function srcToDataUrl(src, maxW = 1000) {
    if (!src) return Promise.resolve(null);
    if (src.startsWith("data:")) return Promise.resolve(src);
    if (srcCache.has(src)) return srcCache.get(src);
    const p = new Promise(resolve => {
      const img = new Image();
      img.onload = () => {
        const scale = Math.min(1, maxW / Math.max(img.width, img.height));
        const canvas = document.createElement("canvas");
        canvas.width = Math.round(img.width * scale);
        canvas.height = Math.round(img.height * scale);
        const ctx = canvas.getContext("2d");
        ctx.fillStyle = "#fff";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        resolve(canvas.toDataURL("image/jpeg", 0.85));
      };
      img.onerror = () => resolve(null);
      img.src = src;
    });
    srcCache.set(src, p);
    return p;
  }
  async function itemDataUrl(it) {
    if (it.dataUrl) return it.dataUrl;
    return (await srcToDataUrl(`assets/real/${it.id}.png`))
        || (await srcToDataUrl(`assets/real/${it.id}.jpg`));
  }

  /* 换装后 600ms 内没有新动作才真正调用，防止连点造成一串付费请求；
     同一模特+同一身衣服的生成结果缓存，来回切换不重复计费 */
  let tryonSeq = 0, tryonTimer = null;
  const genCache = new Map();
  const failCache = new Map();     /* 失败组合 → 失败时刻；冷静期内同组合不再发请求，防反复计费 */
  const FAIL_COOLDOWN = 10000;     /* 冷静期 10 秒（产品负责人定），期间重试只提示不请求 */
  function applyTryon() {
    clearTimeout(tryonTimer);
    if (!wearing.length) {           /* 身上没有任何衣服：不发生成请求、不进加载态，显示纯模特 */
      tryonSeq++;                    /* 作废在途请求，防过期结果穿回已脱掉的衣服 */
      generating = false; genImage = null; renderStage(); return;
    }
    const m = curModel();
    const key = (m.id || "m0") + "|" + [...wearing].sort().join(",");
    if (genCache.has(key)) { doTryon(); return; }   /* 命中缓存：立即出图，无加载态 */
    if (Date.now() - (failCache.get(key) || 0) < FAIL_COOLDOWN) {
      tryonSeq++;                    /* 作废在途请求，防过期结果与当前穿着错配 */
      generating = false; renderStage();   /* 撤掉可能残留的加载遮罩，台上保持原样 */
      toast("刚失败过，请稍等几秒再试");             /* 冷静期内：不发请求不花钱 */
      return;
    }
    generating = true;
    renderStage();                                   /* 未缓存：立即进加载态，等待期不显示临时叠图 */
    tryonTimer = setTimeout(doTryon, 600);
  }
  async function doTryon() {
    const seq = ++tryonSeq;
    const m = curModel();
    /* 缓存 key 含全部单品（含鞋子）：生图模型把鞋子也一起生成，换鞋会改变结果图，需重新生成 */
    const key = (m.id || "m0") + "|" + [...wearing].sort().join(",");
    let img, mock = false;
    if (genCache.has(key)) {
      img = genCache.get(key);
    } else {
      generating = true;
      renderStage();                 /* 兜底确保加载态（防抖已提前进入） */
      try {
        const modelImage = m.dataUrl || await srcToDataUrl(defaultModelSrc(), 1200);
        const items = [];
        for (const id of wearing) {
          const it = itemById(id);
          if (it) items.push({ id: it.id, category: it.cat, image: await itemDataUrl(it) });
        }
        Track.send("tryon_submit", { itemCount: items.length });
        const r = await AI.tryon(modelImage, items);
        img = r && r.image ? r.image : null;
        mock = !!(r && r.mock);      /* mock=无密钥/后端不在线的预期降级，不算失败 */
      } catch { img = null; }
      if (img) genCache.set(key, img);
    }
    if (seq !== tryonSeq) return;    /* 等待期间又换了衣服，丢弃过期结果 */
    generating = false;
    if (img) {                       /* 成功：衣服直接上身 */
      offlineOverlay = false;        /* 真生成成功：解除演示模式锁存，后续失败按真失败处理 */
      genImage = img;
      renderStage();
      saveSnapshot();
    } else if (mock) {               /* 演示模式：叠图保底（双击 HTML 也能用） */
      offlineOverlay = true;
      genImage = null;
      renderStage();
      saveSnapshot();
    } else {                         /* 真生成失败：台上保持原样（旧生成图或纯模特），提示重试 */
      failCache.set(key, Date.now());
      renderStage();
      toast("生成失败，请重试");
    }
  }

  /* ---------- 试衣间快照：每次完整试穿自动记录 ---------- */
  async function saveSnapshot() {
    if (wearing.length < 2) return;   // 单件不算完整试穿
    const s = Store.get();
    const last = s.history[0];
    const key = [...wearing].sort().join(",");
    if (last && (last.items || []).slice().sort().join(",") === key) return;  // 连续重复不存

    /* 有真试穿生成图：整图已含鞋子，直接压小存快照；没有则整套叠图合成 */
    let image = null;
    try { image = genImage ? await compressImage(genImage, 480, 0.62) : await composeSnapshot(); }
    catch { image = null; }
    const o = OUTFITS.find(x => x.id === curOutfitId);
    Store.set({
      history: [{
        id: "h" + Date.now(), outfitId: curOutfitId,
        items: [...wearing], scene: o ? o.scene : "其他",
        time: Date.now(), image,
      }, ...s.history].slice(0, 20),
    });
  }

  /* 本地合成快照：模特图 + 衣服叠放 画到 canvas */
  const CAT_POS = {
    "上衣":   { top: .16, h: .30, maxW: .72 },
    "连体裙": { top: .16, h: .52, maxW: .66 },
    "下装":   { top: .43, h: .38, maxW: .60 },
    "鞋子":   { top: .87, h: .13, maxW: .48 },
  };
  function loadImg(src) {
    return new Promise((ok, no) => {
      const im = new Image();
      im.onload = () => ok(im);
      im.onerror = no;
      im.src = src;
    });
  }
  /* baseSrc=底图（默认当前模特），cats=只画这些分类的衣服（默认全画） */
  async function composeSnapshot(baseSrc = null, cats = null) {
    const W = 480, H = 720;
    const canvas = document.createElement("canvas");
    canvas.width = W; canvas.height = H;
    const ctx = canvas.getContext("2d");
    const g = ctx.createLinearGradient(0, 0, 0, H);
    g.addColorStop(0, stageCols ? stageCols[0] : "#f2f2ef");
    g.addColorStop(1, stageCols ? stageCols[1] : "#e6e6e2");
    ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);

    const m = curModel();
    let base;
    try { base = await loadImg(baseSrc || m.dataUrl || defaultModelSrc()); }
    catch { base = await loadImg("assets/ph/model.svg"); }
    const bw = base.width || 240, bh = base.height || 480;
    const scale = Math.min((W * .62) / bw, (H * .92) / bh);
    const dw = bw * scale, dh = bh * scale;
    ctx.drawImage(base, (W - dw) / 2, H - dh, dw, dh);

    for (const id of wearing) {
      const it = itemById(id);
      if (cats && !(it && cats.includes(it.cat))) continue;
      const pos = it && CAT_POS[it.cat];
      if (!pos) continue;
      let im;
      try { im = await loadImg(itemSrc(it)); }
      catch { try { im = await loadImg(`assets/ph/${it.ph}.svg`); } catch { continue; } }
      const iw = im.width || 200, ih = im.height || 200;
      const s2 = Math.min((H * pos.h) / ih, (W * pos.maxW) / iw);
      const w2 = iw * s2, h2 = ih * s2;
      ctx.drawImage(im, (W - w2) / 2, H * pos.top, w2, h2);
    }
    return canvas.toDataURL("image/jpeg", 0.62);
  }

  /* ---------- 模特角标 ---------- */
  function renderModelBadge() {
    const m = curModel();
    $("#modelSwitch").innerHTML = m.dataUrl ? `<img src="${m.dataUrl}">` : "👤";
  }
  $("#modelSwitch").addEventListener("click", () => location.href = "create-model.html");

  /* ---------- 穿搭 tab（场景筛选；被删衣服的搭配不再展示） ---------- */
  let dScene = "全部";
  function renderSceneChipsD() {
    const scenes = ["全部", "通勤", "约会", "旅行", "日常"];
    $("#sceneChipsD").innerHTML = scenes.map(c =>
      `<button class="dchip ${c === dScene ? "on" : ""}" data-c="${c}">${c}</button>`).join("");
    $$("#sceneChipsD .dchip").forEach(c => c.addEventListener("click", () => {
      dScene = c.dataset.c; renderSceneChipsD(); renderOutfitGrid();
    }));
  }
  function renderOutfitGrid() {
    $("#outfitGrid").innerHTML =
      `<div class="dcell add" data-add>＋</div>` +
      availableOutfits().filter(o => dScene === "全部" || o.scene === dScene).map(o => `
        <div class="dcell ${o.id === curOutfitId ? "on" : ""}" data-o="${o.id}">
          <div class="combo">${o.items.slice(0, 4).map(id => itemImg(itemById(id))).join("")}</div>
        </div>`).join("");
    $$("[data-o]").forEach(c => c.addEventListener("click", () => {
      const o = OUTFITS.find(x => x.id === c.dataset.o);
      wearing = [...o.items]; curOutfitId = o.id;   /* 旧生成图交给 doTryon 统一管理，失败时留旧图 */
      renderAll(); applyTryon();
      toast(`已试穿「${o.name}」`);
    }));
    bindAdd();
  }

  /* ---------- 我的衣服 tab ---------- */
  let cFilter = "全部";
  function renderCatChips() {
    $("#catChips").innerHTML = CATS.map(c =>
      `<button class="dchip ${c === cFilter ? "on" : ""}" data-c="${c}">${c}</button>`).join("");
    $$("#catChips .dchip").forEach(c => c.addEventListener("click", () => {
      cFilter = c.dataset.c; renderCatChips(); renderMineGrid();
    }));
  }
  function renderMineGrid() {
    const list = wardrobeItems().filter(i => cFilter === "全部" || i.cat === cFilter);
    /* 后台拆分任务进度卡：跨页面由轮询快照驱动（segCardList/segCardInner 在 app.js，衣橱页同款） */
    const localCard = localScan
      ? `<div class="dcell scan"><div class="split-prog"><span class="spname">AI 识别中…</span><div class="spbar"><i style="width:30%"></i></div></div></div>`
      : "";
    const splitCards = segCardList().map(c => `<div class="dcell scan">${segCardInner(c)}</div>`).join("");
    $("#mineGrid").innerHTML =
      `<div class="dcell add" data-add>＋</div>` + localCard + splitCards +
      list.map(it => `
        <div class="dcell ${wearing.includes(it.id) ? "on" : ""}" data-i="${it.id}">
          ${it.dataUrl ? `<img src="${it.dataUrl}">` : itemImg(it)}
        </div>`).join("");
    $$("[data-i]").forEach(c => c.addEventListener("click", () => wearItem(c.dataset.i)));
    bindSegRetry();
    bindAdd();
  }

  /* + 号：打开系统相册选图 → 提交后台拆分任务 → 进度卡逐件点亮入橱（与衣橱页同一套机制） */
  let uploading = false;   /* 提交进行中锁住 + 号，连点不再重复起付费任务 */
  let localScan = false;   /* 离线回退的即时识别态 */

  function bindAdd() {
    $$("[data-add]").forEach(c => c.onclick = () => {
      if (uploading) { toast("正在提交上一张，稍等一下再传"); return; }
      $("#fileInput").click();
    });
  }

  $("#fileInput").addEventListener("change", e => {
    const f = e.target.files[0];
    if (!f) return;
    const reader = new FileReader();
    reader.onload = async () => {
      uploading = true;
      try {
        const small = await compressImage(reader.result);
        Track.send("split_submit", { from: "tryon" });
        const r = await AI.segmentStart(small);
        if (r.jobId) {
          Store.set({ pendingSegments: [...(Store.get().pendingSegments || []), { jobId: r.jobId, ts: Date.now(), landed: [] }] });
          renderMineGrid();
          toast("上传成功，AI 正在整理");
          pollSegmentJobs();   /* 立即拉一次，尽快出识别结果的进度卡 */
        } else if (r.local) {
          /* 离线回退：本地模拟即时入橱 */
          localScan = true;
          renderMineGrid();
          await new Promise(rr => setTimeout(rr, 1200));
          const items = await buildSegmentItems(r.local);
          const saved = Store.set({ customItems: [...items, ...Store.get().customItems] });
          localScan = false;
          renderMineGrid(); syncAIBtn();
          if (saved !== false) toast(items.length > 1 ? `AI 拆分出 ${items.length} 件，已入橱` : "已添加到衣橱");
        }
      } catch (err) {
        console.warn("发起拆分失败", err);
        localScan = false;
        renderMineGrid();
        /* 401/429 已由 ai.js 统一提示过（err.handled），别再用通用文案覆盖 */
        if (!err || !err.handled) toast("上传失败，请重新试一次");
      } finally {
        uploading = false;
      }
    };
    reader.readAsDataURL(f);
    e.target.value = "";
  });

  /* 后台任务状态推进/完成入橱后：本页在则实时刷新抽屉 */
  window.addEventListener("segments-updated", () => { renderMineGrid(); syncAIBtn(); });

  /* 穿上单品：同分类替换，连体裙与上/下装互斥 */
  function wearItem(id) {
    const it = itemById(id);
    const same = wearing.find(w => itemById(w)?.cat === it.cat);
    const takenOff = same === id;                       /* 点已穿的同一件 = 脱下 */
    if (takenOff) { wearing = wearing.filter(w => w !== id); }
    else if (same) { wearing = wearing.map(w => (w === same ? id : w)); }
    else {
      if (it.cat === "连体裙") wearing = wearing.filter(w => !["上衣", "下装"].includes(itemById(w)?.cat));
      if (["上衣", "下装"].includes(it.cat)) wearing = wearing.filter(w => itemById(w)?.cat !== "连体裙");
      wearing = [...wearing, id];
    }
    curOutfitId = null;                                 /* 旧生成图交给 doTryon 统一管理，失败时留旧图 */
    renderAll(); applyTryon();
    toast(takenOff ? `已脱下「${it.name}」` : `已换上「${it.name}」`);
  }

  /* ---------- AI 搭配 ---------- */
  function hasUploads() { return Store.get().customItems.length > 0; }
  function syncAIBtn() { $("#btnAI").classList.toggle("off", !hasUploads()); }

  async function aiMatch(around) {
    const btn = $("#btnAI");
    if (btn.disabled) return;            /* 搭配请求进行中，连点不再重复调用付费模型 */
    btn.disabled = true;
    btn.innerHTML = '<span class="star">✦</span> AI 搭配中…';
    Track.send("recommend_click", { around: !!around });
    try {
      const r = await AI.recommend(wardrobeItems(), around);
      if (r.items && r.items.length) {
        wearing = r.items;
        curOutfitId = null;   /* 旧生成图交给 doTryon 统一管理，失败时留旧图 */
        renderAll();
        await applyTryon();
        toast(r.reason
          ? `AI：${r.reason}`
          : (around ? "AI 已围绕这件衣服完成搭配" : "AI 已为你搭配一套新造型"));
      } else {
        toast("衣橱里的衣服不够搭一套，先多上传几件吧");
      }
    } finally {
      btn.disabled = false;
      btn.innerHTML = '<span class="star">✦</span> AI 搭配我的衣服';
    }
  }

  $("#btnAI").addEventListener("click", () => {
    if (!hasUploads()) {
      toast("衣橱里还没有你的衣服，先上传一件再试试吧");
      return;
    }
    aiMatch(null);
  });

  /* 从衣橱带单品进来：围绕它自动 AI 搭配（先进加载态，不闪临时叠图） */
  if (aiAround) { generating = true; renderStage(); setTimeout(() => aiMatch(aiAround), 400); }

  /* ---------- 收藏 ---------- */
  function syncFav() {
    $("#btnFav").style.color = curOutfitId && Store.get().favorites.includes(curOutfitId) ? "#101012" : "#c9c9c6";
  }
  $("#btnFav").addEventListener("click", () => {
    if (!curOutfitId) { toast("先从「穿搭」里选一套再收藏"); return; }
    const favs = Store.get().favorites;
    const on = favs.includes(curOutfitId);
    Store.set({ favorites: on ? favs.filter(f => f !== curOutfitId) : [...favs, curOutfitId] });
    syncFav();
    toast(on ? "已取消收藏" : "已加入收藏");
  });

  /* ---------- tab 切换 ---------- */
  $$(".dtabs button").forEach(b => b.addEventListener("click", () => {
    $$(".dtabs button").forEach(x => x.classList.remove("on"));
    b.classList.add("on");
    const t = b.dataset.t;
    $("#paneMine").classList.toggle("hidden", t !== "mine");
    $("#paneMine").style.display = t === "mine" ? "flex" : "none";
    $("#paneOutfit").classList.toggle("hidden", t !== "outfit");
    $("#paneOutfit").style.display = t === "outfit" ? "flex" : "none";
  }));

  /* ---------- 抽屉把手拖拽：按住横线上拉看更多衣服，下拉回到默认高度为极限 ---------- */
  const stageEl = $(".stage");
  const grabEl = $(".drawer .grab");
  const stageMax = () => Math.round(window.innerHeight * 0.56);  /* 默认高度 = CSS 的 56dvh */
  const stageMin = () => Math.round(window.innerHeight * 0.24);  /* 拉满时模特区收到 24dvh */
  let gDrag = null;
  grabEl.addEventListener("pointerdown", e => {
    gDrag = { y: e.clientY, h: stageEl.getBoundingClientRect().height };
    stageEl.classList.remove("snap");
    grabEl.setPointerCapture(e.pointerId);
    e.preventDefault();
  });
  grabEl.addEventListener("pointermove", e => {
    if (!gDrag) return;
    const h = Math.min(stageMax(), Math.max(stageMin(), gDrag.h + (e.clientY - gDrag.y)));
    stageEl.style.height = h + "px";
  });
  const gEnd = () => {
    if (!gDrag) return;
    gDrag = null;
    /* 松手吸附到更近的一端 */
    const h = stageEl.getBoundingClientRect().height;
    const to = (h - stageMin() < stageMax() - h) ? stageMin() : stageMax();
    stageEl.classList.add("snap");
    stageEl.style.height = to + "px";
  };
  grabEl.addEventListener("pointerup", gEnd);
  grabEl.addEventListener("pointercancel", gEnd);

  function renderAll() {
    renderStage(); renderOutfitGrid(); renderMineGrid(); renderModelBadge(); syncFav(); syncAIBtn();
  }
  renderCatChips(); renderSceneChipsD(); renderAll();
  if (!aiAround) applyTryon();

  /* 手机返回本页常走 bfcache（页面连内存一起原样恢复、不重新加载），期间在创建模特页
     换过模特的话台上还是旧人。恢复瞬间强制重读 localStorage：模特换了 → 作废旧生成图、
     立即显示新模特并进加载态重新生成；没换 → applyTryon 命中缓存秒显原图，不产生费用。
     （KEEP_BFCACHE：豁免 app.js 的全局刷新兜底——本页刷新会重复触发付费生成） */
  window.KEEP_BFCACHE = true;
  window.addEventListener("pageshow", e => {
    if (!e.persisted) return;
    const prev = Store.get().curModel;
    Store._cache = null;
    if (Store.get().curModel !== prev) genImage = null;
    renderAll();
    applyTryon();
  });
</script>
</body>
</html>

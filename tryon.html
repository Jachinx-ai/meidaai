<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#f2f2ef">
<title>模特试穿 · AI穿搭助手</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/base.css">
<style>
  body { background: #f2f2ef; }
  /* 锁定为一屏：模特舞台固定不随页面滚走，只有抽屉内的衣服网格滚动（同 onboarding 的做法） */
  .app { background: #ecece9; height: 100dvh; min-height: 0; }
  /* 模特舞台 */
  .stage {
    position: relative;
    height: 56dvh;
    display: flex; align-items: flex-end; justify-content: center;
    background: linear-gradient(180deg, #f2f2ef 0%, #e6e6e2 100%);
    overflow: hidden;
  }
  .model-wrap { position: relative; height: 96%; display: flex; align-items: flex-end; justify-content: center; }
  .model-wrap img.base { height: 100%; width: auto; max-width: 88vw; object-fit: contain; display: block; }
  /* AI 生成的整图结果（真模型接入后） */
  .model-wrap img.gen { height: 100%; width: auto; max-width: 88vw; object-fit: contain; display: block; border-radius: 18px; }
  /* 本地叠图合成：按分类定位 */
  .worn {
    position: absolute; left: 50%; transform: translateX(-50%);
    object-fit: contain;
    filter: drop-shadow(0 4px 10px rgba(16,16,18,.18));
    pointer-events: none;
  }
  .worn.cat-上衣   { top: 16%; height: 30%; max-width: 72%; }
  .worn.cat-连体裙 { top: 16%; height: 52%; max-width: 66%; }
  .worn.cat-下装   { top: 43%; height: 38%; max-width: 60%; }
  .worn.cat-鞋子   { bottom: 0; height: 13%; max-width: 48%; }

  .stage-top {
    position: absolute; top: 8px; left: var(--pad); right: var(--pad);
    display: flex; align-items: center; z-index: 5;
  }
  .model-switch {
    width: 46px; height: 46px; border-radius: 50%;
    border: 2px solid #fff; background: var(--fill);
    overflow: hidden; cursor: pointer;
    box-shadow: var(--shadow-card);
    display: flex; align-items: center; justify-content: center; font-size: 18px;
    position: relative;
  }
  .model-switch img { width: 100%; height: 100%; object-fit: cover; }
  .model-switch::after {
    content: "⇄"; position: absolute; right: -3px; top: -3px;
    width: 17px; height: 17px; border-radius: 50%;
    background: var(--ink); color: #fff; font-size: 10px;
    display: flex; align-items: center; justify-content: center;
  }
  .stage-side {
    position: absolute; right: var(--pad); top: 50%; transform: translateY(-70%);
    display: flex; flex-direction: column; gap: 12px; z-index: 5;
  }
  .ai-match {
    position: absolute; right: var(--pad); bottom: 44px; z-index: 6;
    padding: 10px 16px; min-height: 44px;
    font-size: 13px; font-weight: 600; cursor: pointer;
    display: flex; align-items: center; gap: 6px;
    box-shadow: var(--shadow-float);
  }
  .ai-match.off {
    background-image: linear-gradient(var(--card), var(--card)),
      linear-gradient(96deg, #dcdcd9, #dcdcd9);
    color: var(--muted);
    box-shadow: none;
  }
  /* 真实试穿生成中的状态提示 */
  .gen-status {
    position: absolute; left: 50%; top: 62px; transform: translateX(-50%);
    z-index: 6; display: none; align-items: center;
    padding: 9px 16px; border-radius: 999px;
    background: rgba(16,16,18,.85); color: #fff;
    font-size: 13px; font-weight: 600; white-space: nowrap;
  }
  .gen-status.show { display: flex; }

  /* 底部抽屉 */
  .drawer {
    flex: 1;
    background: #1b1b1e; color: #fff;
    border-radius: 26px 26px 0 0;
    margin-top: -22px;
    display: flex; flex-direction: column;
    z-index: 4; position: relative;
    min-height: 0;
  }
  .drawer .grab { width: 42px; height: 4.5px; border-radius: 3px; background: rgba(255,255,255,.22); margin: 10px auto 4px; }
  .dtabs { display: flex; justify-content: center; gap: 44px; padding: 8px 0 2px; }
  .dtabs button {
    background: none; border: none; cursor: pointer;
    font-family: var(--font-body);
    color: rgba(255,255,255,.45); font-size: 17px; font-weight: 700;
    padding: 6px 2px; position: relative;
  }
  .dtabs button.on { color: #fff; }
  .dtabs button.on::after {
    content: ""; position: absolute; left: 50%; transform: translateX(-50%); bottom: -3px;
    width: 24px; height: 3px; border-radius: 2px; background: #fff;
  }
  .dchips { display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; padding: 14px var(--pad) 4px; }
  .dchips::-webkit-scrollbar { display: none; }
  .dchip {
    flex: none; border: none; cursor: pointer;
    padding: 8px 16px; border-radius: 999px;
    background: rgba(255,255,255,.1); color: rgba(255,255,255,.75);
    font-size: 13px; font-weight: 600;
  }
  .dchip.on { background: #fff; color: var(--ink); }
  .dgrid {
    flex: 1; min-height: 0; overflow-y: auto;
    overscroll-behavior: contain;        /* 滑到底不再把手势传给外层，避免"卡住滑不动" */
    -webkit-overflow-scrolling: touch;
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
    padding: 14px var(--pad) calc(20px + env(safe-area-inset-bottom));
    align-content: start;
  }
  .dgrid > * { min-width: 0; }
  .dgrid.pt { padding-top: 18px; }
  .dcell {
    background: #fff; border-radius: 14px;
    aspect-ratio: .86; padding: 10px;
    cursor: pointer; position: relative;
    border: 2px solid transparent;
  }
  .dcell.on {
    border: 3px solid transparent;
    background-image: linear-gradient(#fff, #fff), var(--grad);   /* 渐变描边，加粗更醒目 */
    background-origin: border-box;
    background-clip: padding-box, border-box;
  }
  .dcell img { width: 100%; height: 100%; object-fit: contain; display: block; }
  .dcell.add {
    background: rgba(255,255,255,.08);
    display: flex; align-items: center; justify-content: center;
    color: rgba(255,255,255,.7); font-size: 26px; font-weight: 300;
    border: 1.5px dashed rgba(255,255,255,.25);
  }
  .dcell .combo { display: grid; grid-template-columns: 1fr 1fr; gap: 2px; height: 100%; align-content: center; }
  .dcell .combo img { aspect-ratio: 1; height: auto; }
</style>
</head>
<body>
<div class="app">

  <div class="stage">
    <div class="stage-top">
      <button class="iconbtn" onclick="history.length > 1 ? history.back() : location.href='home.html'"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 5 8 12l6.5 7"/></svg></button>
      <span class="grow"></span>
      <div class="model-switch" id="modelSwitch" title="切换模特"></div>
    </div>

    <div class="model-wrap" id="modelWrap">
      <img class="base" src="assets/ph/model.svg" id="modelImg" alt="试衣模特">
    </div>

    <div class="stage-side">
      <button class="iconbtn" id="btnFav" title="收藏">★</button>
    </div>

    <button class="btn ai-pill ai-match" id="btnAI">✦ AI 搭配我的衣服</button>
    <div class="gen-status" id="genStatus">✦ AI 试穿生成中，约需 20 秒…</div>
  </div>

  <div class="drawer">
    <div class="grab"></div>
    <div class="dtabs">
      <button class="on" data-t="mine">我的衣服</button>
      <button data-t="outfit">穿搭</button>
    </div>

    <div id="paneMine" style="display:flex;flex-direction:column;flex:1;min-height:0">
      <div class="dchips" id="catChips"></div>
      <div class="dgrid" id="mineGrid"></div>
    </div>

    <div id="paneOutfit" class="hidden" style="flex-direction:column;flex:1;min-height:0">
      <div class="dchips" id="sceneChipsD"></div>
      <div class="dgrid" id="outfitGrid"></div>
    </div>
  </div>
</div>

<input type="file" accept="image/*" id="fileInput" class="hidden">

<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script src="js/ai.js"></script>
<script>
  renderStatusbar();

  const qs = new URLSearchParams(location.search);
  let wearing = [];           // 当前上身的单品 id
  let curOutfitId = null;
  let aiAround = null;
  let genImage = null;        // 真模型返回的整图结果（占位实现下为 null）

  /* 初始状态：?outfit= / ?items= / ?item= */
  if (qs.get("outfit")) {
    const o = OUTFITS.find(x => x.id === qs.get("outfit"));
    if (o) { wearing = [...o.items]; curOutfitId = o.id; }
  } else if (qs.get("items")) {
    wearing = qs.get("items").split(",").filter(id => itemById(id));
  } else if (qs.get("item")) {
    wearing = [qs.get("item")];
    aiAround = qs.get("item");
  } else {
    wearing = [...OUTFITS[0].items]; curOutfitId = OUTFITS[0].id;
  }

  /* ---------- 模特与上身合成 ---------- */
  function curModel() {
    const s = Store.get();
    return s.models.find(x => x.id === s.curModel) || s.models[0];
  }
  function itemSrc(it) {
    return it.dataUrl || `assets/real/${it.id}.png`;
  }

  /* 舞台底色自动取当前展示图片的边缘颜色，让照片与背景无缝衔接（占满上半屏） */
  let stageCols = null;
  function syncStageBg(src) {
    const im = new Image();
    im.onload = () => {
      try {
        const c = document.createElement("canvas");
        c.width = im.width; c.height = im.height;
        const x = c.getContext("2d");
        x.drawImage(im, 0, 0);
        const col = (X, Y) => { const d = x.getImageData(X, Y, 1, 1).data; return `rgb(${d[0]},${d[1]},${d[2]})`; };
        stageCols = [col(3, 3), col(3, im.height - 4)];
        $(".stage").style.background = `linear-gradient(180deg, ${stageCols[0]} 0%, ${stageCols[1]} 100%)`;
        /* 页面外围与手机状态栏也跟着照片同色，整页无缝 */
        $(".app").style.background = stageCols[0];
        document.body.style.background = stageCols[0];
        const tm = document.querySelector('meta[name="theme-color"]');
        if (tm) tm.content = stageCols[0];
      } catch {}
    };
    im.src = src;
  }

  /* 舞台渲染：有 AI 生成图用生成图，否则模特图 + 衣服按分类叠放 */
  function renderStage() {
    const m = curModel();
    const wrap = $("#modelWrap");
    if (genImage) {
      /* 生图模型已把鞋子一起生成，直接展示整图，不再前端叠鞋 */
      wrap.innerHTML = `<img class="gen" src="${genImage}" alt="试穿效果">`;
      syncStageBg(genImage);
      return;
    }
    syncStageBg(m.dataUrl || defaultModelSrc());
    wrap.innerHTML = `<img class="base" id="modelImg"
        src="${m.dataUrl || defaultModelSrc()}"
        onerror="this.onerror=null;this.src='assets/ph/model.svg'"
        style="${m.dataUrl ? "border-radius:18px" : ""}" alt="试衣模特">` +
      wearing.map(id => {
        const it = itemById(id);
        if (!it) return "";
        return `<img class="worn cat-${it.cat}" src="${itemSrc(it)}"
          onerror="phFallback(this,'${it.ph}')" alt="${it.name}">`;
      }).join("");
  }

  /* ---------- 真实试穿：每次换装自动生成 ----------
     系统衣服/默认模特是图片文件，先转成 dataURL 再发给模型；
     衣服平铺图铺白底转 JPEG（透明 PNG 直接转会发黑）。转换结果缓存。 */
  const srcCache = new Map();
  function srcToDataUrl(src, maxW = 1000) {
    if (!src) return Promise.resolve(null);
    if (src.startsWith("data:")) return Promise.resolve(src);
    if (srcCache.has(src)) return srcCache.get(src);
    const p = new Promise(resolve => {
      const img = new Image();
      img.onload = () => {
        const scale = Math.min(1, maxW / Math.max(img.width, img.height));
        const canvas = document.createElement("canvas");
        canvas.width = Math.round(img.width * scale);
        canvas.height = Math.round(img.height * scale);
        const ctx = canvas.getContext("2d");
        ctx.fillStyle = "#fff";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        resolve(canvas.toDataURL("image/jpeg", 0.85));
      };
      img.onerror = () => resolve(null);
      img.src = src;
    });
    srcCache.set(src, p);
    return p;
  }
  async function itemDataUrl(it) {
    if (it.dataUrl) return it.dataUrl;
    return (await srcToDataUrl(`assets/real/${it.id}.png`))
        || (await srcToDataUrl(`assets/real/${it.id}.jpg`));
  }

  /* 换装后 600ms 内没有新动作才真正调用，防止连点造成一串付费请求；
     同一模特+同一身衣服的生成结果缓存，来回切换不重复计费 */
  let tryonSeq = 0, tryonTimer = null;
  const genCache = new Map();
  function applyTryon() {
    clearTimeout(tryonTimer);
    tryonTimer = setTimeout(doTryon, 600);
  }
  async function doTryon() {
    const seq = ++tryonSeq;
    const m = curModel();
    /* 缓存 key 含全部单品（含鞋子）：生图模型把鞋子也一起生成，换鞋会改变结果图，需重新生成 */
    const key = (m.id || "m0") + "|" + [...wearing].sort().join(",");
    let img;
    if (genCache.has(key)) {
      img = genCache.get(key);
    } else {
      $("#genStatus").classList.add("show");
      try {
        const modelImage = m.dataUrl || await srcToDataUrl(defaultModelSrc(), 1200);
        const items = [];
        for (const id of wearing) {
          const it = itemById(id);
          if (it) items.push({ id: it.id, category: it.cat, image: await itemDataUrl(it) });
        }
        const r = await AI.tryon(modelImage, items);
        img = r && r.image ? r.image : null;
      } catch { img = null; }
      if (img) genCache.set(key, img);
    }
    if (seq !== tryonSeq) return;    /* 等待期间又换了衣服，丢弃过期结果 */
    $("#genStatus").classList.remove("show");
    genImage = img;
    renderStage();
    saveSnapshot();
  }

  /* ---------- 试衣间快照：每次完整试穿自动记录 ---------- */
  async function saveSnapshot() {
    if (wearing.length < 2) return;   // 单件不算完整试穿
    const s = Store.get();
    const last = s.history[0];
    const key = [...wearing].sort().join(",");
    if (last && (last.items || []).slice().sort().join(",") === key) return;  // 连续重复不存

    /* 有真试穿生成图：整图已含鞋子，直接压小存快照；没有则整套叠图合成 */
    let image = null;
    try { image = genImage ? await compressImage(genImage, 480, 0.62) : await composeSnapshot(); }
    catch { image = null; }
    const o = OUTFITS.find(x => x.id === curOutfitId);
    Store.set({
      history: [{
        id: "h" + Date.now(), outfitId: curOutfitId,
        items: [...wearing], scene: o ? o.scene : "其他",
        time: Date.now(), image,
      }, ...s.history].slice(0, 20),
    });
  }

  /* 本地合成快照：模特图 + 衣服叠放 画到 canvas */
  const CAT_POS = {
    "上衣":   { top: .16, h: .30, maxW: .72 },
    "连体裙": { top: .16, h: .52, maxW: .66 },
    "下装":   { top: .43, h: .38, maxW: .60 },
    "鞋子":   { top: .87, h: .13, maxW: .48 },
  };
  function loadImg(src) {
    return new Promise((ok, no) => {
      const im = new Image();
      im.onload = () => ok(im);
      im.onerror = no;
      im.src = src;
    });
  }
  /* baseSrc=底图（默认当前模特），cats=只画这些分类的衣服（默认全画） */
  async function composeSnapshot(baseSrc = null, cats = null) {
    const W = 480, H = 720;
    const canvas = document.createElement("canvas");
    canvas.width = W; canvas.height = H;
    const ctx = canvas.getContext("2d");
    const g = ctx.createLinearGradient(0, 0, 0, H);
    g.addColorStop(0, stageCols ? stageCols[0] : "#f2f2ef");
    g.addColorStop(1, stageCols ? stageCols[1] : "#e6e6e2");
    ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);

    const m = curModel();
    let base;
    try { base = await loadImg(baseSrc || m.dataUrl || defaultModelSrc()); }
    catch { base = await loadImg("assets/ph/model.svg"); }
    const bw = base.width || 240, bh = base.height || 480;
    const scale = Math.min((W * .62) / bw, (H * .92) / bh);
    const dw = bw * scale, dh = bh * scale;
    ctx.drawImage(base, (W - dw) / 2, H - dh, dw, dh);

    for (const id of wearing) {
      const it = itemById(id);
      if (cats && !(it && cats.includes(it.cat))) continue;
      const pos = it && CAT_POS[it.cat];
      if (!pos) continue;
      let im;
      try { im = await loadImg(itemSrc(it)); }
      catch { try { im = await loadImg(`assets/ph/${it.ph}.svg`); } catch { continue; } }
      const iw = im.width || 200, ih = im.height || 200;
      const s2 = Math.min((H * pos.h) / ih, (W * pos.maxW) / iw);
      const w2 = iw * s2, h2 = ih * s2;
      ctx.drawImage(im, (W - w2) / 2, H * pos.top, w2, h2);
    }
    return canvas.toDataURL("image/jpeg", 0.62);
  }

  /* ---------- 模特角标 ---------- */
  function renderModelBadge() {
    const m = curModel();
    $("#modelSwitch").innerHTML = m.dataUrl ? `<img src="${m.dataUrl}">` : "👤";
  }
  $("#modelSwitch").addEventListener("click", () => location.href = "create-model.html");

  /* ---------- 穿搭 tab（场景筛选；被删衣服的搭配不再展示） ---------- */
  let dScene = "全部";
  function renderSceneChipsD() {
    const scenes = ["全部", "通勤", "约会", "旅行", "日常"];
    $("#sceneChipsD").innerHTML = scenes.map(c =>
      `<button class="dchip ${c === dScene ? "on" : ""}" data-c="${c}">${c}</button>`).join("");
    $$("#sceneChipsD .dchip").forEach(c => c.addEventListener("click", () => {
      dScene = c.dataset.c; renderSceneChipsD(); renderOutfitGrid();
    }));
  }
  function renderOutfitGrid() {
    $("#outfitGrid").innerHTML =
      `<div class="dcell add" data-add>＋</div>` +
      availableOutfits().filter(o => dScene === "全部" || o.scene === dScene).map(o => `
        <div class="dcell ${o.id === curOutfitId ? "on" : ""}" data-o="${o.id}">
          <div class="combo">${o.items.slice(0, 4).map(id => itemImg(itemById(id))).join("")}</div>
        </div>`).join("");
    $$("[data-o]").forEach(c => c.addEventListener("click", () => {
      const o = OUTFITS.find(x => x.id === c.dataset.o);
      wearing = [...o.items]; curOutfitId = o.id; genImage = null;
      renderAll(); applyTryon();
      toast(`已试穿「${o.name}」`);
    }));
    bindAdd();
  }

  /* ---------- 我的衣服 tab ---------- */
  let cFilter = "全部";
  function renderCatChips() {
    $("#catChips").innerHTML = CATS.map(c =>
      `<button class="dchip ${c === cFilter ? "on" : ""}" data-c="${c}">${c}</button>`).join("");
    $$("#catChips .dchip").forEach(c => c.addEventListener("click", () => {
      cFilter = c.dataset.c; renderCatChips(); renderMineGrid();
    }));
  }
  function renderMineGrid() {
    const list = wardrobeItems().filter(i => cFilter === "全部" || i.cat === cFilter);
    $("#mineGrid").innerHTML =
      `<div class="dcell add" data-add>＋</div>` +
      list.map(it => `
        <div class="dcell ${wearing.includes(it.id) ? "on" : ""}" data-i="${it.id}">
          ${it.dataUrl ? `<img src="${it.dataUrl}">` : itemImg(it)}
        </div>`).join("");
    $$("[data-i]").forEach(c => c.addEventListener("click", () => wearItem(c.dataset.i)));
    bindAdd();
  }

  /* + 号：打开系统相册选图 → 压缩 → AI 抠图 → 入橱 */
  let uploading = false;   /* 识别进行中锁住 + 号，连点不再重复调用付费模型 */
  function bindAdd() {
    $$("[data-add]").forEach(c => c.onclick = () => {
      if (uploading) { toast("上一件还在识别中，稍等几秒再传"); return; }
      $("#fileInput").click();
    });
  }
  $("#fileInput").addEventListener("change", e => {
    const f = e.target.files[0];
    if (!f) return;
    const reader = new FileReader();
    reader.onload = async () => {
      uploading = true;
      toast("AI 正在识别整理…");
      try {
        const small = await compressImage(reader.result);
        const r = await AI.segment(small);
        const list = (r.items && r.items.length) ? r.items : [{ image: r.image || small, category: "上衣" }];
        const newItems = list.map((d, i) => ({
          id: "c" + Date.now() + "_" + i,
          name: d.name || "我的单品",
          cat: ["上衣", "下装", "鞋子", "连体裙"].includes(d.category) ? d.category : "上衣",
          ph: "tee",
          dataUrl: d.image || small,
          labels: d.labels || null,
        }));
        Store.set({ customItems: [...newItems, ...Store.get().customItems] });   /* 新上传排最前 */
        renderMineGrid(); syncAIBtn();
        toast(newItems.length > 1 ? `AI 拆分出 ${newItems.length} 件，已全部入橱` : "已添加到衣橱");
      } finally {
        uploading = false;
      }
    };
    reader.readAsDataURL(f);
    e.target.value = "";
  });

  /* 穿上单品：同分类替换，连体裙与上/下装互斥 */
  function wearItem(id) {
    const it = itemById(id);
    const same = wearing.find(w => itemById(w)?.cat === it.cat);
    if (same === id) { wearing = wearing.filter(w => w !== id); }
    else if (same) { wearing = wearing.map(w => (w === same ? id : w)); }
    else {
      if (it.cat === "连体裙") wearing = wearing.filter(w => !["上衣", "下装"].includes(itemById(w)?.cat));
      if (["上衣", "下装"].includes(it.cat)) wearing = wearing.filter(w => itemById(w)?.cat !== "连体裙");
      wearing = [...wearing, id];
    }
    curOutfitId = null; genImage = null;
    renderAll(); applyTryon();
    toast(`已换上「${it.name}」`);
  }

  /* ---------- AI 搭配 ---------- */
  function hasUploads() { return Store.get().customItems.length > 0; }
  function syncAIBtn() { $("#btnAI").classList.toggle("off", !hasUploads()); }

  async function aiMatch(around) {
    const btn = $("#btnAI");
    if (btn.disabled) return;            /* 搭配请求进行中，连点不再重复调用付费模型 */
    btn.disabled = true;
    btn.textContent = "✦ AI 搭配中…";
    try {
      const r = await AI.recommend(wardrobeItems(), around);
      if (r.items && r.items.length) {
        wearing = r.items;
        curOutfitId = null; genImage = null;
        renderAll();
        await applyTryon();
        toast(r.reason
          ? `AI：${r.reason}`
          : (around ? "AI 已围绕这件衣服完成搭配" : "AI 已为你搭配一套新造型"));
      } else {
        toast("衣橱里的衣服不够搭一套，先多上传几件吧");
      }
    } finally {
      btn.disabled = false;
      btn.innerHTML = "✦ AI 搭配我的衣服";
    }
  }

  $("#btnAI").addEventListener("click", () => {
    if (!hasUploads()) {
      toast("衣橱里还没有你的衣服，先上传一件再试试吧");
      return;
    }
    aiMatch(null);
  });

  /* 从衣橱带单品进来：围绕它自动 AI 搭配 */
  if (aiAround) setTimeout(() => aiMatch(aiAround), 400);

  /* ---------- 收藏 ---------- */
  function syncFav() {
    $("#btnFav").style.color = curOutfitId && Store.get().favorites.includes(curOutfitId) ? "#101012" : "#c9c9c6";
  }
  $("#btnFav").addEventListener("click", () => {
    if (!curOutfitId) { toast("先从「穿搭」里选一套再收藏"); return; }
    const favs = Store.get().favorites;
    const on = favs.includes(curOutfitId);
    Store.set({ favorites: on ? favs.filter(f => f !== curOutfitId) : [...favs, curOutfitId] });
    syncFav();
    toast(on ? "已取消收藏" : "已加入收藏");
  });

  /* ---------- tab 切换 ---------- */
  $$(".dtabs button").forEach(b => b.addEventListener("click", () => {
    $$(".dtabs button").forEach(x => x.classList.remove("on"));
    b.classList.add("on");
    const t = b.dataset.t;
    $("#paneMine").classList.toggle("hidden", t !== "mine");
    $("#paneMine").style.display = t === "mine" ? "flex" : "none";
    $("#paneOutfit").classList.toggle("hidden", t !== "outfit");
    $("#paneOutfit").style.display = t === "outfit" ? "flex" : "none";
  }));

  function renderAll() {
    renderStage(); renderOutfitGrid(); renderMineGrid(); renderModelBadge(); syncFav(); syncAIBtn();
  }
  renderCatChips(); renderSceneChipsD(); renderAll();
  if (!aiAround) applyTryon();
</script>
</body>
</html>
